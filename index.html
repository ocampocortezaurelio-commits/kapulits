// ─── SUPABASE SYNC ──────────────────────────────────────────────────
const SB_URL='https://rmzwczoxzemwdoalywfe.supabase.co';
const SB_KEY='sb_publishable_2lfU9ISeLSrL5yuMgPnILA_N8CQsUoQ';
let _sb=null;
try{_sb=window.supabase?.createClient(SB_URL,SB_KEY);}catch(e){}

async function cloudLoad(){
  if(!_sb)return null;
  try{
    const{data,error}=await _sb.from('kapulits_state').select('data,updated_at').eq('id','main').single();
    if(error||!data)return null;
    return data;
  }catch(e){return null;}
}
let _saveTimer=null;
async function cloudSave(state){
  if(!_sb)throw new Error('no client');
  const{error}=await _sb.from('kapulits_state').upsert({id:'main',data:state,updated_at:new Date().toISOString()},{onConflict:'id'});
  if(error)throw error;
}

function migrateProducts(prods){
  const ids=prods.map(p=>p.id);
  const missing=PRODUCTOS_DEFAULT.filter(d=>!ids.includes(d.id));
  return missing.length?[...prods,...missing]:prods;
}

// ─── STORE ──────────────────────────────────────────────────────────
function useStore(){
  const [state,setState]=useState(()=>{
    try{const s=localStorage.getItem('kapulits_v2');if(s){const p=JSON.parse(s);
      return{...INITIAL_STATE,...p,productos:migrateProducts(p.productos||PRODUCTOS_DEFAULT),costos:p.costos||COSTOS_DEFAULT,
        empleados:p.empleados||EMPLEADOS_DEFAULT,impresora:p.impresora||INITIAL_STATE.impresora};}}catch(e){}
    return INITIAL_STATE;
  });
  const [syncStatus,setSyncStatus]=useState('idle');
  const [remoteUpdate,setRemoteUpdate]=useState(false);

  useEffect(()=>{
    setSyncStatus('syncing');
    cloudLoad().then(cloud=>{
      if(cloud?.data){
        const localTs=localStorage.getItem('kapulits_ts')||'';
        if(!localTs||cloud.updated_at>localTs){
          const p=cloud.data;
          const ns={...INITIAL_STATE,...p,
            productos:migrateProducts(p.productos||PRODUCTOS_DEFAULT),
            costos:p.costos||COSTOS_DEFAULT,
            empleados:p.empleados||EMPLEADOS_DEFAULT,
            impresora:p.impresora||INITIAL_STATE.impresora};
          try{localStorage.setItem('kapulits_v2',JSON.stringify(ns));
              localStorage.setItem('kapulits_ts',cloud.updated_at);}catch(e){}
          setState(ns);
        }
      }
      setSyncStatus('synced');
    }).catch(()=>setSyncStatus('offline'));
  },[]);

  // Realtime subscription
  useEffect(()=>{
    if(!_sb)return;
    const channel=_sb.channel('kapulits-sync')
      .on('postgres_changes',{event:'*',schema:'public',table:'kapulits_state',filter:'id=eq.main'},
        (payload)=>{
          if(!payload.new?.data)return;
          const cloudTs=payload.new.updated_at;
          const localTs=localStorage.getItem('kapulits_ts')||'';
          if(cloudTs&&cloudTs>localTs){
            const p=payload.new.data;
            const ns={...INITIAL_STATE,...p,
              productos:migrateProducts(p.productos||PRODUCTOS_DEFAULT),
              costos:p.costos||COSTOS_DEFAULT,
              empleados:p.empleados||EMPLEADOS_DEFAULT,
              impresora:p.impresora||INITIAL_STATE.impresora};
            try{localStorage.setItem('kapulits_v2',JSON.stringify(ns));
                localStorage.setItem('kapulits_ts',cloudTs);}catch(e){}
            setState(ns);
            setSyncStatus('synced');
            setRemoteUpdate(true);
            setTimeout(()=>setRemoteUpdate(false),3000);
          }
        })
      .subscribe();
    return()=>{_sb.removeChannel(channel);};
  },[]);

  const save=useCallback(ns=>{
    try{
      localStorage.setItem('kapulits_v2',JSON.stringify(ns));
      localStorage.setItem('kapulits_ts',new Date().toISOString());
    }catch(e){}
    setState(ns);
    setSyncStatus('syncing');
    if(_saveTimer)clearTimeout(_saveTimer);
    _saveTimer=setTimeout(()=>{
      cloudSave(ns).then(()=>setSyncStatus('synced')).catch(()=>setSyncStatus('offline'));
    },800);
  },[]);
  const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const now=()=>new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  const today=()=>new Date().toISOString().slice(0,10);

  const abrirJornada=useCallback((fondoInicial,fecha)=>{
    const j={id:uid(),fecha:fecha||today(),estado:'abierta',fondoInicial:Number(fondoInicial)||0,
      ventas:[],gastos:[],pedidos:[],mandaditos:[],contadorPedido:1,
      horaApertura:now(),horaCierre:null,totalEfectivo:null,diferencia:null,observaciones:''};
    save({...state,jornadas:[...state.jornadas,j],jornadaActiva:j});
  },[state,save]);

  const cerrarJornada=useCallback((totalEfectivo,observaciones)=>{
    if(!state.jornadaActiva)return;
    const ja={...state.jornadaActiva,estado:'cerrada',horaCierre:now(),
      totalEfectivo:Number(totalEfectivo)||0,observaciones:observaciones||''};
    const ventasEf=ja.ventas.filter(v=>v.metodoPago==='efectivo').reduce((s,v)=>s+v.total,0);
    const gastosEf=ja.gastos.filter(g=>g.enEfectivo!==false).reduce((s,g)=>s+g.monto,0);
    const esperado=ja.fondoInicial+ventasEf-gastosEf;
    ja.diferencia=(Number(totalEfectivo)||0)-esperado;
    const js=state.jornadas.map(j=>j.id===ja.id?ja:j);
    save({...state,jornadas:js,jornadaActiva:null});
  },[state,save]);

  const crearPedido=useCallback((items,tipoEntrega,cliente,direccion,notas)=>{
    if(!state.jornadaActiva)return null;
    const ja=state.jornadaActiva;
    const totalProductos=items.reduce((s,i)=>s+i.subtotal,0);
    const tarifa=TARIFAS_ENVIO[tipoEntrega]||TARIFAS_ENVIO.recoger;
    const costoEnvio=tarifa.precio;
    const pedido={id:uid(),numero:ja.contadorPedido,fecha:ja.fecha,hora:now(),
      items,totalProductos,costoEnvio,total:totalProductos+costoEnvio,
      tipoEntrega,cliente:cliente||'',direccion:direccion||'',notas:notas||'',
      estado:'nuevo',cobrado:false,metodoPago:null};
    const jaNew={...ja,pedidos:[...ja.pedidos,pedido],contadorPedido:ja.contadorPedido+1};
    if(costoEnvio>0){
      jaNew.mandaditos=[...ja.mandaditos,{id:uid(),pedidoId:pedido.id,pedidoNum:pedido.numero,
        hora:now(),cliente:pedido.cliente,direccion:pedido.direccion,
        tipo:tipoEntrega,tarifa:costoEnvio,cobrado:false}];
    }
    const js=state.jornadas.map(j=>j.id===jaNew.id?jaNew:j);
    save({...state,jornadas:js,jornadaActiva:jaNew});
    return pedido;
  },[state,save]);

  const actualizarPedido=useCallback((pedidoId,cambios)=>{
    if(!state.jornadaActiva)return;
    const ja={...state.jornadaActiva};
    const pedOld=ja.pedidos.find(p=>p.id===pedidoId);
    if(!pedOld)return;

    // Si cambian items, recalcular totales
    let newItems=cambios.items||pedOld.items;
    let newTipo=cambios.tipoEntrega||pedOld.tipoEntrega;
    let newTotalProd=cambios.items?cambios.items.reduce((s,i)=>s+i.subtotal,0):pedOld.totalProductos;
    let newCostoEnvio=(TARIFAS_ENVIO[newTipo]||TARIFAS_ENVIO.recoger).precio;
    let newTotal=newTotalProd+newCostoEnvio;

    // Gestionar mandaditos si cambia tipo de envio
    if(cambios.tipoEntrega&&cambios.tipoEntrega!==pedOld.tipoEntrega){
      const oldEnvio=(TARIFAS_ENVIO[pedOld.tipoEntrega]?.precio||0)>0;
      const newEnvio=(TARIFAS_ENVIO[cambios.tipoEntrega]?.precio||0)>0;
      if(!oldEnvio&&newEnvio){
        ja.mandaditos=[...ja.mandaditos,{id:uid(),pedidoId,pedidoNum:pedOld.numero,
          hora:now(),cliente:cambios.cliente||pedOld.cliente,direccion:cambios.direccion||pedOld.direccion,
          tipo:cambios.tipoEntrega,tarifa:newCostoEnvio,cobrado:false}];
      }else if(oldEnvio&&!newEnvio){
        ja.mandaditos=ja.mandaditos.filter(m=>m.pedidoId!==pedidoId);
      }else if(oldEnvio&&newEnvio){
        ja.mandaditos=ja.mandaditos.map(m=>m.pedidoId===pedidoId?
          {...m,tipo:cambios.tipoEntrega,tarifa:newCostoEnvio,cliente:cambios.cliente||m.cliente,direccion:cambios.direccion||m.direccion}:m);
      }
    }

    const mergedCambios={...cambios,totalProductos:newTotalProd,costoEnvio:newCostoEnvio,total:newTotal};
    ja.pedidos=ja.pedidos.map(p=>p.id===pedidoId?{...p,...mergedCambios}:p);

    // Si se cobra, crear venta y marcar mandadito
    if(cambios.cobrado&&cambios.metodoPago){
      const ped=ja.pedidos.find(p=>p.id===pedidoId);
      if(ped){
        const venta={id:uid(),hora:now(),items:ped.items,total:ped.totalProductos,
          metodoPago:cambios.metodoPago,pedidoId:ped.id};
        ja.ventas=[...ja.ventas,venta];
        ja.mandaditos=ja.mandaditos.map(m=>m.pedidoId===pedidoId?{...m,cobrado:true}:m);
      }
    }
    const js=state.jornadas.map(j=>j.id===ja.id?ja:j);
    save({...state,jornadas:js,jornadaActiva:ja});
  },[state,save]);

  const registrarGasto=useCallback((categoria,descripcion,monto,enEfectivo=true)=>{
    if(!state.jornadaActiva)return;
    const gasto={id:uid(),hora:now(),categoria,descripcion,monto:Number(monto),enEfectivo};
    const ja={...state.jornadaActiva,gastos:[...state.jornadaActiva.gastos,gasto]};
    const js=state.jornadas.map(j=>j.id===ja.id?ja:j);
    save({...state,jornadas:js,jornadaActiva:ja});
  },[state,save]);

  const eliminarGasto=useCallback(gastoId=>{
    if(!state.jornadaActiva)return;
    const ja={...state.jornadaActiva,gastos:state.jornadaActiva.gastos.filter(g=>g.id!==gastoId)};
    const js=state.jornadas.map(j=>j.id===ja.id?ja:j);
    save({...state,jornadas:js,jornadaActiva:ja});
  },[state,save]);

  const actualizarProducto=useCallback((pid,datos)=>{save({...state,productos:state.productos.map(p=>p.id===pid?{...p,...datos}:p)});},[state,save]);
  const actualizarGastoFijo=useCallback((gid,monto)=>{save({...state,gastosFijos:state.gastosFijos.map(g=>g.id===gid?{...g,monto:Number(monto)}:g)});},[state,save]);
  const actualizarImpresora=useCallback(datos=>{save({...state,impresora:{...state.impresora,...datos}});},[state,save]);
  const importarProductos=useCallback(prods=>{save({...state,productos:prods});},[state,save]);
  const importarCostos=useCallback(costos=>{save({...state,costos});},[state,save]);

  return{state,syncStatus,remoteUpdate,abrirJornada,cerrarJornada,crearPedido,actualizarPedido,
    registrarGasto,eliminarGasto,actualizarProducto,actualizarGastoFijo,
    actualizarImpresora,importarProductos,importarCostos};
}

// ─── UTILS ──────────────────────────────────────────────────────────
const fmt=n=>{const v=Number(n||0);return(v<0?'-$':'$')+Math.abs(v).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});};
const fmtDate=iso=>{if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});};
const fmtDateShort=iso=>{if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('es-MX',{day:'numeric',month:'short'});};
const pct=(a,b)=>b>0?((a/b)*100).toFixed(1)+'%':'0%';
const calcVentasTotal=(ventas=[])=>ventas.reduce((s,v)=>s+v.total,0);
const calcGastosTotal=(gastos=[])=>gastos.reduce((s,g)=>s+g.monto,0);
const calcMandaditosTotal=(mandaditos=[])=>mandaditos.reduce((s,m)=>s+m.tarifa,0);

// ─── PRINTER SANITIZER (ASCII for 58mm thermal) ────────────────────
const ACCENT_MAP={'á':'a','é':'e','í':'i','ó':'o','ú':'u','ñ':'n','Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U','Ñ':'N',
  '¡':'!','¿':'?','ü':'u','Ü':'U','à':'a','è':'e','ì':'i','ò':'o','ù':'u','\u2019':"'"};
const EMOJI_MAP={'🛵':'ENV','🚗':'ENV','🏃':'REC','📍':'Dir:','📝':'Nota:','🙏':'','💰':'$','✅':'OK',
  '🍲':'','🌮':'','🫓':'','🧀':'','🥙':'','🫔':'','🥪':'','🍜':'','🥤':'','🍹':'','🥛':'','🧪':'',
  '🎉':'','🌟':'','━':'-','─':'-','│':'|'};

function sanitize(text){
  let r='';
  for(const ch of text){
    if(ACCENT_MAP[ch]!==undefined){r+=ACCENT_MAP[ch];}
    else if(EMOJI_MAP[ch]!==undefined){r+=EMOJI_MAP[ch];}
    else if(ch.codePointAt(0)<128){r+=ch;}
  }
  return r;
}

function getProductoStats(jornadas,productos){
  const stats={};
  productos.forEach(p=>{stats[p.id]={id:p.id,nombre:p.nombre,precio:p.precio,costo:p.costo,emoji:p.emoji,cantidad:0,revenue:0};});
  jornadas.forEach(j=>{j.ventas.forEach(v=>{v.items.forEach(item=>{
    if(stats[item.productoId]){stats[item.productoId].cantidad+=item.cantidad;stats[item.productoId].revenue+=item.subtotal;}
  });});});
  return Object.values(stats).sort((a,b)=>b.revenue-a.revenue);
}

function calcProjections(jornadas){
  const cerradas=jornadas.filter(j=>j.estado==='cerrada');
  if(!cerradas.length)return null;
  const revenues=cerradas.map(j=>calcVentasTotal(j.ventas));
  const expenses=cerradas.map(j=>calcGastosTotal(j.gastos));
  const profits=revenues.map((r,i)=>r-expenses[i]);
  const mandas=cerradas.map(j=>calcMandaditosTotal(j.mandaditos||[]));
  const recoger=cerradas.map(j=>(j.pedidos||[]).filter(p=>p.tipoEntrega==='recoger'&&p.estado!=='cancelado').length);
  const envios=cerradas.map(j=>(j.pedidos||[]).filter(p=>p.tipoEntrega!=='recoger'&&p.estado!=='cancelado').length);
  const avg=a=>a.reduce((s,v)=>s+v,0)/a.length;
  const avgR=avg(revenues),avgE=avg(expenses),avgP=avg(profits),avgM=avg(mandas);
  const margin=avgR>0?(avgP/avgR*100):0;
  return{jornadasCount:cerradas.length,avgRevenue:avgR,avgExpenses:avgE,avgProfit:avgP,margin,
    projRevenue:avgR*4,projExpenses:avgE*4,projProfit:avgP*4,
    revenues,expenses,profits,mandas,dates:cerradas.map(j=>j.fecha),
    avgMandaditos:avgM,projMandaditos:avgM*4,
    totalRecoger:recoger.reduce((a,b)=>a+b,0),totalEnvios:envios.reduce((a,b)=>a+b,0)};
}

function getRecomendaciones(proj,stats){
  if(!proj)return[];const recs=[];
  if(proj.margin<25)recs.push({type:'warn',icon:'⚠️',text:`Margen de utilidad: ${proj.margin.toFixed(1)}%. Revisa costos o ajusta precios.`});
  else if(proj.margin>50)recs.push({type:'ok',icon:'🌟',text:`Excelente! Margen del ${proj.margin.toFixed(1)}%.`});
  else recs.push({type:'ok',icon:'✅',text:`Margen de ${proj.margin.toFixed(1)}% saludable.`});
  const top=stats.filter(s=>s.cantidad>0).sort((a,b)=>b.cantidad-a.cantidad)[0];
  if(top)recs.push({type:'info',icon:'⭐',text:`Producto estrella: ${top.emoji} ${top.nombre} (${top.cantidad} pz). Asegura stock!`});
  const mp=stats.filter(s=>s.cantidad>0&&s.precio>0).map(s=>({...s,m:(s.precio-s.costo)/s.precio*100})).sort((a,b)=>b.m-a.m)[0];
  if(mp)recs.push({type:'info',icon:'💡',text:`Mayor rentabilidad: ${mp.emoji} ${mp.nombre} con ${mp.m.toFixed(0)}% margen. Promuevelo!`});
  recs.push({type:'info',icon:'📈',text:`Proyeccion mensual (4 jornadas): ${fmt(proj.projRevenue)} ventas, ${fmt(proj.projProfit)} utilidad.`});
  if(proj.totalEnvios>0||proj.totalRecoger>0){
    recs.push({type:'info',icon:'🛵',text:`Envios: ${proj.totalEnvios} - Recogen: ${proj.totalRecoger}. Mandaditos proyectados: ${fmt(proj.projMandaditos)}/mes.`});
  }
  return recs;
}

// ─── PRINTER ────────────────────────────────────────────────────────
let printerCharacteristic=null;
let _btDevice=null;
const BT_SERVICES=['000018f0-0000-1000-8000-00805f9b34fb','e7810a71-73ae-499d-8c15-faa9aef0c3f2','49535343-fe7d-4ae5-8fa9-9fafd205e455'];

async function _findCharacteristic(server){
  let service;
  for(const sid of BT_SERVICES){try{service=await server.getPrimaryService(sid);break;}catch(e){}}
  if(!service){const svcs=await server.getPrimaryServices();if(svcs.length)service=svcs[0];}
  if(service){const chars=await service.getCharacteristics();
    return chars.find(c=>c.properties.write||c.properties.writeWithoutResponse)||chars[0];}
  return null;
}

async function connectBluetooth(){
  try{
    const device=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:BT_SERVICES});
    _btDevice=device;
    device.addEventListener('gattserverdisconnected',()=>{printerCharacteristic=null;});
    const server=await device.gatt.connect();
    printerCharacteristic=await _findCharacteristic(server);
    return{success:true,name:device.name||'Impresora BT'};
  }catch(e){return{success:false,error:e.message};}
}

async function reconnectBluetooth(){
  // Intento 1: reconectar dispositivo guardado en memoria
  if(_btDevice&&!_btDevice.gatt.connected){
    try{
      const server=await _btDevice.gatt.connect();
      printerCharacteristic=await _findCharacteristic(server);
      if(printerCharacteristic)return true;
    }catch(e){}
  }
  // Intento 2: buscar dispositivos previamente pareados (Chrome 85+)
  if(navigator.bluetooth?.getDevices){
    try{
      const devices=await navigator.bluetooth.getDevices();
      for(const dev of devices){
        try{
          const server=await dev.gatt.connect();
          _btDevice=dev;
          dev.addEventListener('gattserverdisconnected',()=>{printerCharacteristic=null;});
          printerCharacteristic=await _findCharacteristic(server);
          if(printerCharacteristic)return true;
        }catch(e){}
      }
    }catch(e){}
  }
  return false;
}

function _buildBTText(pedido){
  const tarifa=TARIFAS_ENVIO[pedido.tipoEntrega]||TARIFAS_ENVIO.recoger;
  const sep='-'.repeat(32);
  let t=`\n      K'apul'Its\n    Birria y algo mas\n${sep}\n`;
  t+=`  PEDIDO #${String(pedido.numero).padStart(3,'0')}\n  ${pedido.fecha}  ${pedido.hora}\n`;
  if(pedido.cliente)t+=`  Cliente: ${pedido.cliente}\n`;
  const tipoTxt=pedido.tipoEntrega==='recoger'?'REC':'ENV';
  t+=`  ${tipoTxt} ${tarifa.label}\n`;
  if(pedido.direccion&&pedido.tipoEntrega!=='recoger')t+=`  Dir: ${pedido.direccion}\n`;
  t+=sep+'\n';
  pedido.items.forEach(i=>{
    const nom=i.nombre.substring(0,18).padEnd(18);
    t+=` ${String(i.cantidad).padStart(2)}x ${nom} ${fmt(i.subtotal).padStart(7)}\n`;
  });
  t+=sep+'\n';
  if(pedido.costoEnvio>0)t+=`  Envio:        ${fmt(pedido.costoEnvio).padStart(10)}\n`;
  t+=`  TOTAL:        ${fmt(pedido.total).padStart(10)}\n${sep}\n`;
  t+=`  ${NEGOCIO.direccion}\n  Tel.: ${NEGOCIO.telefono}\n  Gracias por tu compra!\n\n\n`;
  return sanitize(t);
}

async function _sendToBT(text){
  const data=new Uint8Array([...text].map(c=>c.charCodeAt(0)&0x7F));
  for(let i=0;i<data.length;i+=100){await printerCharacteristic.writeValue(data.slice(i,i+100));}
}

async function printTicket(pedido){
  // Si no hay conexion BT activa, intentar reconectar silenciosamente
  if(!printerCharacteristic&&(_btDevice||navigator.bluetooth?.getDevices)){
    await reconnectBluetooth();
  }
  // Imprimir por Bluetooth si hay conexion
  if(printerCharacteristic){
    try{
      await _sendToBT(_buildBTText(pedido));
      return{success:true,method:'bluetooth'};
    }catch(e){
      // Si fallo, la conexion murio — intentar reconectar una vez mas
      printerCharacteristic=null;
      const ok=await reconnectBluetooth();
      if(ok){
        try{
          await _sendToBT(_buildBTText(pedido));
          return{success:true,method:'bluetooth'};
        }catch(e2){}
      }
    }
  }
  // Fallback: mostrar preview en-app (sin ventana ni dialogo de impresion)
  if(_showTicketPreview)_showTicketPreview(pedido);
  return{success:true,method:'preview'};
}

function BarChart({labels=[],values=[],color='#f97316',height=140}){
  if(!values.length)return null;const max=Math.max(...values,1);const W=Math.max(labels.length*56,300);const bw=36;

function LineChart({dates=[],revenues=[],profits=[]}){
  if(revenues.length<2)return null;const allV=[...revenues,...profits];const max=Math.max(...allV,1);const min=Math.min(...profits,0);
  const range=max-min||1;const W=Math.max(dates.length*70,300);const H=140;
  const pt=(v,i)=>`${i*(W/(dates.length-1||1))},${H-((v-min)/range)*(H-20)+10}`;
  return(<div className="overflow-x-auto"><svg width={W} height={H+30} style={{minWidth:'100%'}}>
    <polyline points={revenues.map((v,i)=>pt(v,i)).join(' ')} fill="none" stroke="#f97316" strokeWidth={2.5} strokeLinejoin="round"/>
    <polyline points={profits.map((v,i)=>pt(v,i)).join(' ')} fill="none" stroke="#22c55e" strokeWidth={2.5} strokeLinejoin="round" strokeDasharray="4,3"/>
    {revenues.map((v,i)=><circle key={'r'+i} cx={i*(W/(dates.length-1||1))} cy={H-((v-min)/range)*(H-20)+10} r={4} fill="#f97316"/>)}
    {profits.map((v,i)=><circle key={'p'+i} cx={i*(W/(dates.length-1||1))} cy={H-((v-min)/range)*(H-20)+10} r={4} fill="#22c55e"/>)}
    {dates.map((d,i)=><text key={i} x={i*(W/(dates.length-1||1))} y={H+20} textAnchor="middle" fontSize={9} fill="#6b7280">{fmtDateShort(d)}</text>)}
  </svg></div>);
}

      <Input label="Observaciones (opcional)" value={obs} onChange={setObs} placeholder="Notas del dia..."/>

    </div></Modal>);

// ─── PRODUCT SELECTOR (shared by Create & Edit) ─────────────────────
function ProductSelector({productos,cart,setCart}){
  const prods=productos.filter(p=>p.activo);
  const platillos=prods.filter(p=>p.cat==='platillo');
  const combos=prods.filter(p=>p.cat==='combo');
  const bebidas=prods.filter(p=>p.cat==='bebida');
  const add=p=>setCart(c=>({...c,[p.id]:{...p,productoId:p.id,cantidad:(c[p.id]?.cantidad||0)+1,subtotal:((c[p.id]?.cantidad||0)+1)*p.precio}}));
  const rem=pid=>setCart(c=>{const n={...c};if(n[pid]?.cantidad>1){n[pid]={...n[pid],cantidad:n[pid].cantidad-1,subtotal:(n[pid].cantidad-1)*n[pid].precio};}else{delete n[pid];}return n;});

  function ProdBtn({p,cols=2}){
    const qty=cart[p.id]?.cantidad||0;
    const desc=COMBO_DESC[p.id];
    return(<button key={p.id} onClick={()=>add(p)}
      className={`relative bg-white rounded-xl ${cols===1?'p-4 flex items-center gap-3':'p-3 text-left'} shadow-sm border-2 card-press ${qty>0?'border-orange-400 bg-orange-50':'border-gray-100'}`}>
      {qty>0&&<span className="absolute top-1 right-1 bg-orange-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center">{qty}</span>}
      <div className={cols===1?'text-3xl':'text-2xl mb-1'}>{p.emoji}</div>
      <div className={cols===1?'flex-1':''}>
        <p className="text-xs font-bold text-gray-800 leading-tight">{p.nombre}</p>
        {desc&&<p className="text-[10px] text-gray-400 mt-0.5 leading-snug">{desc}</p>}
        <p className="text-orange-600 font-black text-sm">{fmt(p.precio)}</p>
      </div>
    </button>);
  }

  return(<React.Fragment>
    {combos.length>0&&(<React.Fragment>
      <p className="text-xs font-bold text-gray-500 uppercase tracking-wider">🎉 Combos</p>
      <div className="grid grid-cols-1 gap-2">{combos.map(p=><ProdBtn key={p.id} p={p} cols={1}/>)}</div>
    </React.Fragment>)}
    <p className="text-xs font-bold text-gray-500 uppercase tracking-wider">🥩 Platillos</p>
    <div className="grid grid-cols-2 gap-2">{platillos.map(p=><ProdBtn key={p.id} p={p}/>)}</div>
    <p className="text-xs font-bold text-gray-500 uppercase tracking-wider">🥤 Bebidas</p>
    <div className="grid grid-cols-3 gap-2">
      {bebidas.map(p=>{const qty=cart[p.id]?.cantidad||0;
        return(<button key={p.id} onClick={()=>add(p)}
          className={`relative bg-white rounded-xl p-2 text-center shadow-sm border-2 card-press ${qty>0?'border-orange-400 bg-orange-50':'border-gray-100'}`}>
          {qty>0&&<span className="absolute top-0 right-0 bg-orange-500 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center">{qty}</span>}
          <div className="text-xl">{p.emoji}</div>
          <p className="text-[10px] font-bold text-gray-700">{p.nombre}</p>
          <p className="text-orange-600 font-black text-xs">{fmt(p.precio)}</p>
        </button>);})}
    </div>
  </React.Fragment>);
}

  const items=Object.values(cart);

  if(!items.length)return null;
  return(<div className="bg-orange-50 rounded-2xl p-3 space-y-1">
    {items.map(i=>(<div key={i.id||i.productoId} className="flex items-center justify-between">
      <span className="text-xs text-gray-600">{i.emoji} {i.nombre}</span>
      <div className="flex items-center gap-2">
        <button onClick={()=>onRem(i.id||i.productoId)} className="w-6 h-6 rounded-full bg-gray-200 text-gray-700 font-black text-xs flex items-center justify-center">-</button>
        <span className="font-black text-xs w-4 text-center">{i.cantidad}</span>
        <button onClick={()=>onAdd(i)} className="w-6 h-6 rounded-full bg-orange-500 text-white font-black text-xs flex items-center justify-center">+</button>
        <span className="font-bold text-xs w-12 text-right">{fmt(i.subtotal)}</span>

    <div className="border-t border-orange-200 pt-2 mt-2 space-y-1">
      <div className="flex justify-between text-xs"><span className="text-gray-600">Productos</span><span className="font-bold">{fmt(totalProd)}</span></div>
      {costoEnvio>0&&<div className="flex justify-between text-xs"><span className="text-purple-600">🛵 Costo envio</span><span className="font-bold text-purple-600">{fmt(costoEnvio)}</span></div>}

            onEntregar={()=>onActualizarPedido(p.id,{estado:'entregado'})}

      {entregados.length>0&&(<div>
        <p className="text-xs font-bold text-green-600 uppercase tracking-wider mb-2">🟢 Entregados ({entregados.length})</p>

          <PedidoCard key={p.id} pedido={p} onCobrar={()=>setShowCobrar(p)} onPrint={()=>printTicket(p)} showEntregar={false}/>))}</div></div>)}

          <div key={p.id} className="bg-red-50 rounded-xl p-3 border border-red-100 opacity-60">

function CrearPedidoModal({open,onClose,productos,impresora,onCrear}){
  const [cart,setCart]=useState({});const [tipo,setTipo]=useState('recoger');
  const [cliente,setCliente]=useState('');const [direccion,setDireccion]=useState('');const [notas,setNotas]=useState('');
  const items=Object.values(cart);const totalProd=items.reduce((s,i)=>s+i.subtotal,0);
  const costoEnvio=(TARIFAS_ENVIO[tipo]||TARIFAS_ENVIO.recoger).precio;
  const totalFinal=totalProd+costoEnvio;
  const add=p=>setCart(c=>({...c,[p.id]:{...p,productoId:p.id,cantidad:(c[p.id]?.cantidad||0)+1,subtotal:((c[p.id]?.cantidad||0)+1)*p.precio}}));
  const rem=pid=>setCart(c=>{const n={...c};if(n[pid]?.cantidad>1){n[pid]={...n[pid],cantidad:n[pid].cantidad-1,subtotal:(n[pid].cantidad-1)*n[pid].precio};}else{delete n[pid];}return n;});
  const crear=()=>{
    if(!items.length)return;
    const its=items.map(i=>({productoId:i.id||i.productoId,nombre:i.nombre,cantidad:i.cantidad,precio:i.precio,subtotal:i.subtotal,emoji:i.emoji}));
    onCrear(its,tipo,cliente,direccion,notas);setCart({});setCliente('');setDireccion('');setNotas('');};
  return(<Modal open={open} onClose={onClose} title="📋 Nuevo Pedido" fullScreen>
    <div className="space-y-4">
      <DeliverySelector tipo={tipo} setTipo={setTipo}/>
      <Input label="Nombre del cliente" value={cliente} onChange={setCliente} placeholder="Nombre"/>
      {tipo!=='recoger'&&<Input label="Direccion de envio" value={direccion} onChange={setDireccion} placeholder="Calle, numero, colonia..."/>}
      <ProductSelector productos={productos} cart={cart} setCart={setCart}/>
      <CartSummary cart={cart} costoEnvio={costoEnvio} onAdd={add} onRem={rem}/>
      {items.length>0&&(<React.Fragment>
        <Input label="Notas del pedido (opcional)" value={notas} onChange={setNotas} placeholder="Sin cebolla, extra salsa..."/>
        <Btn full color="green" size="lg" onClick={crear}>📋 Crear Pedido · {fmt(totalFinal)}</Btn>
      </React.Fragment>)}
    </div></Modal>);
}

function EditarPedidoModal({open,pedido,productos,onClose,onGuardar}){
  const [cart,setCart]=useState(()=>{
    const c={};
    pedido.items.forEach(i=>{c[i.productoId]={...i,id:i.productoId};});
    return c;
  });
  const [tipo,setTipo]=useState(pedido.tipoEntrega);
  const [cliente,setCliente]=useState(pedido.cliente||'');
  const [direccion,setDireccion]=useState(pedido.direccion||'');
  const [notas,setNotas]=useState(pedido.notas||'');
  const items=Object.values(cart);const totalProd=items.reduce((s,i)=>s+i.subtotal,0);
  const costoEnvio=(TARIFAS_ENVIO[tipo]||TARIFAS_ENVIO.recoger).precio;
  const totalFinal=totalProd+costoEnvio;
  const add=p=>setCart(c=>({...c,[p.id||p.productoId]:{...p,productoId:p.id||p.productoId,cantidad:(c[p.id||p.productoId]?.cantidad||0)+1,subtotal:((c[p.id||p.productoId]?.cantidad||0)+1)*p.precio}}));

  const guardar=()=>{
    if(!items.length)return;

function MandaditosReport({jornadas,jornadaActiva}){
  const todas=[...jornadas.filter(j=>j.estado==='cerrada')];
  if(jornadaActiva)todas.push(jornadaActiva);
  const totalManda=todas.reduce((s,j)=>s+calcMandaditosTotal(j.mandaditos||[]),0);
  const totalEnvios=todas.reduce((s,j)=>s+(j.mandaditos||[]).length,0);
  const totalRecoger=todas.reduce((s,j)=>s+(j.pedidos||[]).filter(p=>p.tipoEntrega==='recoger'&&p.estado!=='cancelado').length,0);
  const totalClientes=totalEnvios+totalRecoger;
  const porTipo={};
  todas.forEach(j=>(j.mandaditos||[]).forEach(m=>{
    if(!porTipo[m.tipo])porTipo[m.tipo]={cant:0,total:0};
    porTipo[m.tipo].cant++;porTipo[m.tipo].total+=m.tarifa;
  }));
  return(<div className="space-y-5">
    {totalClientes===0&&<EmptyState emoji="🛵" title="Sin datos de envios" sub="Los mandaditos apareceran aqui"/>}
    {totalClientes>0&&(<React.Fragment>
      <div className="grid grid-cols-2 gap-3">
        <MetricCard icon="🛵" label="Ingresos Mandaditos" value={fmt(totalManda)} color="purple" sub="Contabilidad separada"/>
        <MetricCard icon="📦" label="Total Envios" value={totalEnvios} color="blue"/>
        <MetricCard icon="🏃" label="Pasan a Recoger" value={totalRecoger} color="green"/>
        <MetricCard icon="👥" label="Total Clientes" value={totalClientes} color="orange"/>
      </div>
      {Object.keys(porTipo).length>0&&(<div className="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
        <h3 className="font-black text-gray-800 mb-3 text-sm">Desglose por tipo de envio</h3>
        {Object.entries(porTipo).map(([tipo,data])=>{const t=TARIFAS_ENVIO[tipo];
          return(<div key={tipo} className="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
            <span className="text-sm text-gray-600">{t?.emoji} {t?.label||tipo}</span>
            <div className="text-right"><p className="font-bold text-sm text-purple-600">{fmt(data.total)}</p>
              <p className="text-xs text-gray-400">{data.cant} servicios</p></div></div>);})}
      </div>)}
      <div className="bg-purple-50 rounded-2xl p-4 text-sm text-purple-700">
        <p className="font-bold">📌 Nota: Mandaditos</p>
        <p className="text-xs mt-1 opacity-70">Este ingreso se contabiliza por separado del negocio. Es un servicio externo que no afecta la utilidad de ventas de productos.</p>
      </div>
    </React.Fragment>)}
  </div>);
}

            <div className="mt-2 bg-gray-100 rounded-full h-2"><div className={`h-2 rounded-full ${margen>=40?'bg-green-500':margen>=20?'bg-yellow-400':'bg-red-400'}`} style={{width:`${Math.min(margen,100)}%`}}/></div>
          </div>);})}
      </div>)}

      {tab==='productos'&&(<div className="space-y-3">
        {state.productos.map(p=>(<div key={p.id} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between">
          <div className="flex items-center gap-3"><span className="text-2xl">{p.emoji}</span>
            <div><p className="font-bold text-sm">{p.nombre}</p><p className="text-xs text-gray-500">{fmt(p.precio)}{COMBO_DESC[p.id]?` · ${COMBO_DESC[p.id]}`:''}</p></div></div>
          <button onClick={()=>onActualizarProducto(p.id,{activo:!p.activo})}
            className={`w-12 h-6 rounded-full transition-colors ${p.activo?'bg-green-500':'bg-gray-300'} relative`}>
            <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all ${p.activo?'right-0.5':'left-0.5'}`}/></button>
        </div>))}</div>)}

      {tab==='impresora'&&(<ImpresoraTab impresora={state.impresora} onActualizar={onActualizarImpresora}/>)}

      {tab==='config'&&(<div className="space-y-5">
        <div className="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
          <h3 className="font-black text-gray-800 mb-3 text-sm">💼 Equipo</h3>
          {state.empleados.map(e=>(<div key={e.id} className="flex items-center justify-between py-3 border-b border-gray-50 last:border-0">
            <div><p className="font-bold text-sm">{e.nombre}</p><p className="text-xs text-gray-400">{e.rol}</p></div>
            <p className={`font-black text-sm ${e.sueldo>0?'text-orange-600':'text-gray-400'}`}>{e.sueldo>0?fmt(e.sueldo):'Socio'}</p></div>))}
          <div className="mt-3 border-t pt-3 flex justify-between">
            <span className="font-bold text-sm">Total nomina/jornada</span>
            <span className="font-black text-orange-600">{fmt(state.empleados.reduce((s,e)=>s+e.sueldo,0))}</span></div></div>
        <div className="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
          <h3 className="font-black text-gray-800 mb-3 text-sm">📌 Gastos fijos</h3>
          {state.gastosFijos.map(g=>(<div key={g.id} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
            <span className="text-sm text-gray-700">{g.nombre}</span>
            <div className="flex items-center border-2 border-gray-200 rounded-xl overflow-hidden">
              <span className="px-2 text-gray-400 text-sm">$</span>
              <input type="number" value={g.monto} onChange={e=>onActualizarGastoFijo(g.id,e.target.value)}
                className="w-20 py-1.5 text-sm font-bold text-right outline-none pr-2"/></div></div>))}</div>
        <div className="bg-gray-50 rounded-2xl p-4 text-xs text-gray-500 text-center">
          <p className="font-bold">K'apul'Its v{APP_VERSION}</p>
          <p>{NEGOCIO.direccion}</p>
          <p>Tel.: {NEGOCIO.telefono}</p></div>
      </div>)}
    </div>

    {editProd&&<Modal open={!!editProd} onClose={()=>setEditProd(null)} title={`Editar: ${editProd.nombre}`}>
      <EditProductoForm producto={editProd} onSave={d=>{onActualizarProducto(editProd.id,d);setEditProd(null);}}/></Modal>}
  </div>);
}

// ── Importar Tab ──
function ImportarTab({onImportarProductos,onImportarCostos,productos,costos}){
  const [status,setStatus]=useState('');const fileRef=useRef(null);const [importType,setImportType]=useState(null);

  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setStatus('📂 Leyendo archivo...');
    try{
      const data=await file.arrayBuffer();
      const wb=XLSX.read(data);
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws);
      if(!json.length){setStatus('❌ El archivo esta vacio');return;}

      if(importType==='menu'){
        const prods=json.map((r,i)=>({
          id:r.id||('prod_'+i),nombre:r.nombre||'',precio:Number(r.precio)||0,
          costo:Number(r.costo)||0,cat:r.categoria||'platillo',emoji:r.emoji||'🍽️',activo:r.activo!==false&&r.activo!=='no'
        })).filter(p=>p.nombre);
        if(prods.length){onImportarProductos(prods);setStatus(`✅ ${prods.length} productos importados`);}
        else setStatus('❌ No se encontraron productos validos');
      }else if(importType==='costos'){
        const cs=json.map((r,i)=>({
          id:r.id||('costo_'+i),nombre:r.nombre||'',unidad:r.unidad||'',
          pu:Number(r.precio_unitario||r.pu||r.precio)||0,cat:r.categoria||''
        })).filter(c=>c.nombre);
        if(cs.length){onImportarCostos(cs);setStatus(`✅ ${cs.length} costos importados`);}
        else setStatus('❌ No se encontraron costos validos');
      }
    }catch(e){setStatus(`❌ Error: ${e.message}`);}
    if(fileRef.current)fileRef.current.value='';
  };

  const descargarPlantilla=(tipo)=>{
    let wb,ws,data;
    if(tipo==='menu'){
      data=[{id:'consome',nombre:'Consome',precio:115,costo:38,categoria:'platillo',emoji:'🍲',activo:'si'}];
      productos.forEach(p=>{ if(p.id!=='consome')data.push({id:p.id,nombre:p.nombre,precio:p.precio,costo:p.costo,categoria:p.cat,emoji:p.emoji,activo:p.activo?'si':'no'});});
    }else{
      data=costos.map(c=>({id:c.id,nombre:c.nombre,unidad:c.unidad,precio_unitario:c.pu,categoria:c.cat}));
    }
    wb=XLSX.utils.book_new();ws=XLSX.utils.json_to_sheet(data);
    XLSX.utils.book_append_sheet(wb,ws,'Datos');
    XLSX.writeFile(wb,`plantilla_${tipo}.xlsx`);
  };

  return(<div className="space-y-5">
    <div className="bg-orange-50 rounded-2xl p-4 text-sm text-orange-700">
      <p className="font-bold mb-2">📥 Dashboard de Importacion</p>
      <p className="text-xs opacity-70">Sube archivos Excel (.xlsx) para actualizar datos sin necesidad de modificar codigo.</p>
    </div>
    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <h3 className="font-black text-gray-800 mb-4 text-sm">🍽️ Menu y Precios</h3>
      <p className="text-xs text-gray-500 mb-3">Actualiza los productos del menu, precios y costos estimados.</p>
      <div className="flex gap-2 mb-3">
        <Btn size="sm" color="gray" onClick={()=>descargarPlantilla('menu')}>📄 Descargar</Btn>
        <Btn size="sm" color="orange" onClick={()=>{setImportType('menu');fileRef.current?.click();}}>📤 Subir Excel</Btn>
      </div>
      <p className="text-xs text-gray-400">Columnas: id · nombre · precio · costo · categoria · emoji · activo</p>
    </div>
    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <h3 className="font-black text-gray-800 mb-4 text-sm">🧾 Base de Costos (Ingredientes)</h3>
      <p className="text-xs text-gray-500 mb-3">Actualiza la base de datos de costos de insumos.</p>
      <div className="flex gap-2 mb-3">
        <Btn size="sm" color="gray" onClick={()=>descargarPlantilla('costos')}>📄 Descargar</Btn>
        <Btn size="sm" color="orange" onClick={()=>{setImportType('costos');fileRef.current?.click();}}>📤 Subir Excel</Btn>
      </div>
      <p className="text-xs text-gray-400">Columnas: id · nombre · unidad · precio_unitario · categoria</p>
    </div>
    <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} className="hidden"/>
    {status&&<div className={`rounded-2xl p-4 text-sm font-bold text-center ${status.startsWith('✅')?'bg-green-50 text-green-700':status.startsWith('❌')?'bg-red-50 text-red-600':'bg-blue-50 text-blue-700'}`}>{status}</div>}
  </div>);
}

function ImpresoraTab({impresora,onActualizar}){
  const [status,setStatus]=useState('');const hasBT='bluetooth' in navigator;
  const conectar=async()=>{setStatus('Buscando...');const r=await connectBluetooth();
    if(r.success){onActualizar({tipo:'bluetooth',nombre:r.name,conectada:true});setStatus(`✅ ${r.name}`);}
    else setStatus(`❌ ${r.error}`);};
  const testPrint=async()=>{
    const p={numero:0,fecha:new Date().toISOString().slice(0,10),hora:new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}),
      tipoEntrega:'recoger',cliente:'PRUEBA',direccion:'',notas:'Ticket de prueba',totalProductos:100,costoEnvio:0,total:100,
      items:[{productoId:'test',nombre:'Producto prueba',cantidad:1,precio:100,subtotal:100,emoji:'🧪'}]};
    const r=await printTicket(p);setStatus(r.success?`✅ Impreso (${r.method})`:'❌ Error');};
  return(<div className="space-y-5">
    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <h3 className="font-black text-gray-800 mb-4 text-sm">🖨️ Impresora de tickets</h3>
      <div className="space-y-4">
        <div className={`rounded-2xl p-4 border-2 ${impresora.conectada?'border-green-300 bg-green-50':'border-gray-200 bg-gray-50'}`}>
          <div className="flex items-center gap-3"><span className="text-3xl">{impresora.conectada?'🟢':'⚪'}</span>
            <div><p className="font-bold text-sm">{impresora.conectada?impresora.nombre:'Sin impresora'}</p>
              <p className="text-xs text-gray-500">{impresora.conectada?impresora.tipo:'Conecta una para imprimir tickets'}</p></div></div></div>
        {hasBT&&<Btn full onClick={conectar}>📡 Conectar Bluetooth</Btn>}
        {!hasBT&&<div className="bg-yellow-50 rounded-xl p-3 text-sm text-yellow-700">
          <p className="font-bold">⚠️ Bluetooth no disponible</p>
          <p className="text-xs mt-1">Los tickets se imprimiran como ventana emergente.</p></div>}
        <Btn full color="gray" onClick={testPrint}>🧪 Ticket de prueba</Btn>
        <div className="flex items-center justify-between">
          <div><p className="text-sm font-bold">Auto-imprimir</p><p className="text-xs text-gray-400">Al crear pedido</p></div>
          <button onClick={()=>onActualizar({autoImprimir:!impresora.autoImprimir})}
            className={`w-12 h-6 rounded-full ${impresora.autoImprimir?'bg-green-500':'bg-gray-300'} relative`}>
            <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow ${impresora.autoImprimir?'right-0.5':'left-0.5'}`}/></button></div>
        {status&&<p className="text-center text-sm font-bold">{status}</p>}
      </div></div>
  </div>);
}

function EditProductoForm({producto,onSave}){
  const [precio,setPrecio]=useState(producto.precio);const [costo,setCosto]=useState(producto.costo);
  const margen=precio>0?(((precio-costo)/precio)*100).toFixed(1):0;
  return(<div className="space-y-4">
    <Input label="Precio de venta" type="number" prefix="$" value={precio} onChange={v=>setPrecio(Number(v))}/>
    <Input label="Costo estimado" type="number" prefix="$" value={costo} onChange={v=>setCosto(Number(v))}/>
    <div className={`rounded-xl p-3 text-center font-bold ${margen>=40?'bg-green-50 text-green-700':margen>=20?'bg-yellow-50 text-yellow-700':'bg-red-50 text-red-600'}`}>
      Margen: {margen}% {margen>=40?'✅':margen>=20?'⚠️':'🚨'}</div>
    <Btn full onClick={()=>onSave({precio,costo})}>Guardar</Btn></div>);
}

// ─── APP ────────────────────────────────────────────────────────────
// Global callback for preview fallback
let _showTicketPreview=null;

function App(){
  const [page,setPage]=useState('dashboard');
  const {state,syncStatus,remoteUpdate,abrirJornada,cerrarJornada,crearPedido,actualizarPedido,
    registrarGasto,eliminarGasto,actualizarProducto,actualizarGastoFijo,
    actualizarImpresora,importarProductos,importarCostos}=useStore();
  const hasJornada=!!state.jornadaActiva;
  const pedidosNuevos=state.jornadaActiva?(state.jornadaActiva.pedidos||[]).filter(p=>p.estado==='nuevo').length:0;
  const [toast,setToast]=useState(null);
  const [previewPedido,setPreviewPedido]=useState(null);
  const showToast=(msg,color='green')=>{setToast({msg,color});setTimeout(()=>setToast(null),2500);};
  // Register global preview callback
  useEffect(()=>{_showTicketPreview=(pedido)=>setPreviewPedido(pedido);return()=>{_showTicketPreview=null;};},[]);
  return(<div className="relative min-h-screen">
    {page==='dashboard'&&<DashboardPage state={state} syncStatus={syncStatus}
      onAbrir={(f,d)=>{abrirJornada(f,d);showToast('🟢 Jornada abierta');}}
      onCerrar={(e,o)=>{cerrarJornada(e,o);showToast('🔴 Jornada cerrada','red');}}/>}
    {page==='pedidos'&&<PedidosPage state={state}
      onCrearPedido={(i,t,c,dir,n)=>{const p=crearPedido(i,t,c,dir,n);showToast(`📋 Pedido #${String(p?.numero||0).padStart(3,'0')} creado`);return p;}}
      onActualizarPedido={(id,c)=>{actualizarPedido(id,c);
        if(c.cobrado)showToast('💰 Cobrado','green');
        else if(c.estado==='entregado')showToast('✅ Entregado','green');
        else if(c.estado==='cancelado')showToast('🔴 Cancelado','red');
        else if(c.items||c.tipoEntrega)showToast('✏️ Pedido editado','orange');}}/>}
    {page==='gastos'&&<GastosPage state={state}
      onRegistrar={(c,d,m,e)=>{registrarGasto(c,d,m,e);showToast('💸 Gasto registrado','orange');}}
      onEliminar={eliminarGasto}/>}
    {page==='reportes'&&<ReportesPage state={state}/>}
    {page==='admin'&&<AdminPage state={state} onActualizarProducto={actualizarProducto}
      onActualizarGastoFijo={actualizarGastoFijo} onActualizarImpresora={actualizarImpresora}
      onImportarProductos={p=>{importarProductos(p);showToast('✅ Productos actualizados');}}
      onImportarCostos={c=>{importarCostos(c);showToast('✅ Costos actualizados');}}/>}
    <BottomNav page={page} setPage={setPage} hasJornada={hasJornada} pedidosNuevos={pedidosNuevos}/>
    {toast&&(<div className={`fixed top-20 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl text-white font-bold text-sm shadow-xl slide-up
      ${toast.color==='green'?'bg-green-500':toast.color==='red'?'bg-red-500':toast.color==='orange'?'bg-orange-500':'bg-gray-700'}`}>{toast.msg}</div>)}
    {remoteUpdate&&(<div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl bg-blue-500 text-white font-bold text-sm shadow-xl slide-up">
      🔄 Datos actualizados desde otro dispositivo</div>)}
    <TicketPreviewModal open={!!previewPedido} pedido={previewPedido} onClose={()=>setPreviewPedido(null)}/>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
</body>
