};

// ─── SUPABASE SYNC ──────────────────────────────────────────────────
const SB_URL='https://rmzwczoxzemwdoalywfe.supabase.co';
const SB_KEY='sb_publishable_2lfU9ISeLSrL5yuMgPnILA_N8CQsUoQ';
let _sb=null;
try{_sb=window.supabase?.createClient(SB_URL,SB_KEY);}catch(e){}

async function cloudLoad(){
  if(!_sb)return null;
  try{
    const{data,error}=await _sb.from('kapulits_state').select('data,updated_at').eq('id','main').single();
    if(error||!data)return null;
    return data;
  }catch(e){return null;}
}
let _saveTimer=null;

// ─── MERGE HELPERS ──────────────────────────────────────────────────
// Permite que multiples dispositivos creen/editen pedidos al mismo tiempo
// sin que nadie pierda datos. Estrategia: union por id, renumerar colisiones.
function _mergeById(a,b){
  const m=new Map();
  for(const x of(a||[]))if(x&&x.id)m.set(x.id,x);
  for(const x of(b||[]))if(x&&x.id)m.set(x.id,x); // local pisa si hay duplicado
  return Array.from(m.values());
}
function _mergePedidos(cloud,local){
  const list=_mergeById(cloud,local);
  // Detectar duplicados de numero (dos dispositivos crearon pedidos al mismo tiempo
  // y ambos asignaron el mismo numero secuencial). Renumeramos los duplicados.
  const byNum=new Map();
  for(const p of list){
    const k=p.numero;
    if(!byNum.has(k))byNum.set(k,[]);
    byNum.get(k).push(p);
  }
  let maxNum=Math.max(0,...list.map(p=>p.numero||0));
  for(const peds of byNum.values()){
    if(peds.length>1){
      // Conservar el primero por hora; renumerar los demas
      peds.sort((a,b)=>String(a.hora||'').localeCompare(String(b.hora||'')));
      for(let i=1;i<peds.length;i++){maxNum++;peds[i].numero=maxNum;}
    }
  }
  return list.sort((a,b)=>(a.numero||0)-(b.numero||0));
}
function _mergeJornada(cloud,local){
  if(!cloud)return local;
  if(!local)return cloud;
  return {
    ...cloud,...local,
    pedidos:_mergePedidos(cloud.pedidos||[],local.pedidos||[]),
    mandaditos:_mergeById(cloud.mandaditos||[],local.mandaditos||[]),
    gastos:_mergeById(cloud.gastos||[],local.gastos||[]),
    ventas:_mergeById(cloud.ventas||[],local.ventas||[]),
    contadorPedido:Math.max(cloud.contadorPedido||0,local.contadorPedido||0)
  };
}
function _mergeJornadaActiva(cloud,local){
  if(!cloud)return local;
  if(!local)return cloud;
  // Si ambas dispositivos tienen jornada activa pero de fechas distintas,
  // se queda la mas reciente (caso raro: alguien no cerró antes de cambio de dia)
  if(cloud.fecha!==local.fecha)return(cloud.fecha>local.fecha)?cloud:local;
  return _mergeJornada(cloud,local);
}
function _mergeJornadas(cloud,local){
  const m=new Map();
  for(const j of(cloud||[]))if(j&&j.id)m.set(j.id,j);
  for(const j of(local||[])){
    if(!j||!j.id)continue;
    const ex=m.get(j.id);
    m.set(j.id,ex?_mergeJornada(ex,j):j);
  }
  return Array.from(m.values());
}
function _mergeStates(cloud,local){
  if(!cloud)return local;
  if(!local)return cloud;
  return {
    ...cloud,...local,
    jornadas:_mergeJornadas(cloud.jornadas||[],local.jornadas||[]),
    jornadaActiva:_mergeJornadaActiva(cloud.jornadaActiva,local.jornadaActiva)
    // productos, costos, empleados, gastosFijos, impresora: last-write-wins
    // del spread de arriba (cambios de configuracion son raros)
  };
}

// cloudSave hace MERGE entre nube y local antes de subir. Asi multiples
// dispositivos pueden agregar/editar pedidos al mismo tiempo sin perder nada.
async function cloudSave(state){
  if(!_sb)throw new Error('no client');
  try{_autoBackup(state);}catch(e){}
  let merged=state;
  try{
    const cloud=await cloudLoad();
    if(cloud?.data)merged=_mergeStates(cloud.data,state);
  }catch(e){/* sin red, subir state local como esta */}
  const{error}=await _sb.from('kapulits_state').upsert({id:'main',data:merged,updated_at:new Date().toISOString()},{onConflict:'id'});
  if(error)throw error;
  return merged; // devolver el merge para que el cliente refleje pedidos de otros dispositivos
}

// Mantiene hasta 12 snapshots en localStorage (uno cada save).
// Si algun dia se borra la nube, se puede recuperar el ultimo desde aqui.
function _autoBackup(state){
  try{
    const ts=new Date().toISOString();
    localStorage.setItem(`kapulits_backup_${ts}`,JSON.stringify({ts,state}));
    const keys=Object.keys(localStorage).filter(k=>k.startsWith('kapulits_backup_')).sort();
    while(keys.length>12){localStorage.removeItem(keys.shift());}
  }catch(e){}
}
// Expuesto para que el usuario pueda recuperar manualmente desde DevTools si hace falta
window.kapulitsBackups=()=>{
  return Object.keys(localStorage).filter(k=>k.startsWith('kapulits_backup_')).sort()
    .map(k=>{try{return{key:k,...JSON.parse(localStorage.getItem(k))};}catch(e){return{key:k,error:'corrupt'};}});
};
window.kapulitsRestore=(ts)=>{
  const k=`kapulits_backup_${ts}`;
  const raw=localStorage.getItem(k);
  if(!raw){console.error('No existe backup:',k);return false;}
  const {state}=JSON.parse(raw);
  localStorage.setItem('kapulits_v2',JSON.stringify(state));
  localStorage.setItem('kapulits_ts',new Date().toISOString());
  console.log('Backup restaurado. Recargando...');
  setTimeout(()=>location.reload(),500);
  return true;
};

function migrateProducts(prods){
  const ids=prods.map(p=>p.id);
  const missing=PRODUCTOS_DEFAULT.filter(d=>!ids.includes(d.id));
  return missing.length?[...prods,...missing]:prods;
}

// ─── STORE ──────────────────────────────────────────────────────────
function useStore(){
  const [state,setState]=useState(()=>{
    try{const s=localStorage.getItem('kapulits_v2');if(s){const p=JSON.parse(s);
      return{...INITIAL_STATE,...p,productos:migrateProducts(p.productos||PRODUCTOS_DEFAULT),costos:p.costos||COSTOS_DEFAULT,
        empleados:p.empleados||EMPLEADOS_DEFAULT,impresora:p.impresora||INITIAL_STATE.impresora};}}catch(e){}
    return INITIAL_STATE;
  });
  const [syncStatus,setSyncStatus]=useState('idle');
  const [remoteUpdate,setRemoteUpdate]=useState(false);

  useEffect(()=>{
    setSyncStatus('syncing');
    cloudLoad().then(cloud=>{
      if(cloud?.data){
        const localTs=localStorage.getItem('kapulits_ts')||'';
        if(!localTs||cloud.updated_at>localTs){
          const p=cloud.data;
          const ns={...INITIAL_STATE,...p,
            productos:migrateProducts(p.productos||PRODUCTOS_DEFAULT),
            costos:p.costos||COSTOS_DEFAULT,
            empleados:p.empleados||EMPLEADOS_DEFAULT,
            impresora:p.impresora||INITIAL_STATE.impresora};
          try{localStorage.setItem('kapulits_v2',JSON.stringify(ns));
              localStorage.setItem('kapulits_ts',cloud.updated_at);}catch(e){}
          setState(ns);
        }
      }
      // IMPORTANTE: si la nube viene vacia o falla, NUNCA borrar localStorage.
      // El estado local es la fuente de verdad si la nube no responde.
      // El reset solo se hace explicitamente desde Admin -> Reset.
      setSyncStatus('synced');
    }).catch(()=>setSyncStatus('offline'));
  },[]);

  // Realtime subscription
  useEffect(()=>{
    if(!_sb)return;
    const channel=_sb.channel('kapulits-sync')
      .on('postgres_changes',{event:'*',schema:'public',table:'kapulits_state',filter:'id=eq.main'},
        (payload)=>{
          if(!payload.new?.data)return;
          const cloudTs=payload.new.updated_at;
          const localTs=localStorage.getItem('kapulits_ts')||'';
          if(cloudTs&&cloudTs>localTs){
            const p=payload.new.data;
            const ns={...INITIAL_STATE,...p,
              productos:migrateProducts(p.productos||PRODUCTOS_DEFAULT),
              costos:p.costos||COSTOS_DEFAULT,
              empleados:p.empleados||EMPLEADOS_DEFAULT,
              impresora:p.impresora||INITIAL_STATE.impresora};
            try{localStorage.setItem('kapulits_v2',JSON.stringify(ns));
                localStorage.setItem('kapulits_ts',cloudTs);}catch(e){}
            setState(ns);
            setSyncStatus('synced');
            setRemoteUpdate(true);
            setTimeout(()=>setRemoteUpdate(false),3000);
          }
        })
      .subscribe();
    return()=>{_sb.removeChannel(channel);};
  },[]);

  const save=useCallback(ns=>{
    try{
      localStorage.setItem('kapulits_v2',JSON.stringify(ns));
      localStorage.setItem('kapulits_ts',new Date().toISOString());
    }catch(e){}
    setState(ns);
    setSyncStatus('syncing');
    if(_saveTimer)clearTimeout(_saveTimer);
    _saveTimer=setTimeout(()=>{
      cloudSave(ns).then(merged=>{
        // Si el merge incorporó pedidos de otros dispositivos, refrescar local
        if(merged&&merged!==ns){
          const refreshed={...INITIAL_STATE,...merged,
            productos:migrateProducts(merged.productos||PRODUCTOS_DEFAULT),
            costos:merged.costos||COSTOS_DEFAULT,
            empleados:merged.empleados||EMPLEADOS_DEFAULT,
            impresora:merged.impresora||INITIAL_STATE.impresora};
          try{localStorage.setItem('kapulits_v2',JSON.stringify(refreshed));
              localStorage.setItem('kapulits_ts',new Date().toISOString());}catch(e){}
          setState(refreshed);
        }
        setSyncStatus('synced');
      }).catch(()=>setSyncStatus('offline'));
    },800);
  },[]);
  const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const now=()=>new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  const today=()=>new Date().toISOString().slice(0,10);

  const abrirJornada=useCallback((fondoInicial,fecha)=>{
    // Auto-registrar nomina como gastos
    const gastosNomina=state.empleados.filter(e=>e.sueldo>0).map(e=>({
      id:uid(),hora:now(),categoria:'personal',descripcion:`Nomina: ${e.nombre}`,monto:e.sueldo,enEfectivo:true
    }));
    const j={id:uid(),fecha:fecha||today(),estado:'abierta',fondoInicial:Number(fondoInicial)||0,
      ventas:[],gastos:gastosNomina,pedidos:[],mandaditos:[],contadorPedido:1,
      horaApertura:now(),horaCierre:null,totalEfectivo:null,diferencia:null,observaciones:''};
    save({...state,jornadas:[...state.jornadas,j],jornadaActiva:j});
  },[state,save]);

  const cerrarJornada=useCallback((totalEfectivo,observaciones)=>{
    if(!state.jornadaActiva)return;
    const ja={...state.jornadaActiva,estado:'cerrada',horaCierre:now(),
      totalEfectivo:Number(totalEfectivo)||0,observaciones:observaciones||''};
    const ventasEf=ja.ventas.filter(v=>v.metodoPago==='efectivo').reduce((s,v)=>s+v.total,0);
    const gastosEf=ja.gastos.filter(g=>g.enEfectivo!==false).reduce((s,g)=>s+g.monto,0);
    const esperado=ja.fondoInicial+ventasEf-gastosEf;
    ja.diferencia=(Number(totalEfectivo)||0)-esperado;
    const js=state.jornadas.map(j=>j.id===ja.id?ja:j);
    save({...state,jornadas:js,jornadaActiva:null});
  },[state,save]);

  const crearPedido=useCallback((items,tipoEntrega,cliente,direccion,notas)=>{
    if(!state.jornadaActiva)return null;
    const ja=state.jornadaActiva;
    const totalProductos=items.reduce((s,i)=>s+i.subtotal,0);
    const tarifa=TARIFAS_ENVIO[tipoEntrega]||TARIFAS_ENVIO.recoger;
    const costoEnvio=tarifa.precio;
    const pedido={id:uid(),numero:ja.contadorPedido,fecha:ja.fecha,hora:now(),
      items,totalProductos,costoEnvio,total:totalProductos+costoEnvio,
      tipoEntrega,cliente:cliente||'',direccion:direccion||'',notas:notas||'',
      estado:'nuevo',cobrado:false,metodoPago:null};
    const jaNew={...ja,pedidos:[...ja.pedidos,pedido],contadorPedido:ja.contadorPedido+1};
    if(costoEnvio>0){
      jaNew.mandaditos=[...ja.mandaditos,{id:uid(),pedidoId:pedido.id,pedidoNum:pedido.numero,
        hora:now(),cliente:pedido.cliente,direccion:pedido.direccion,
        tipo:tipoEntrega,tarifa:costoEnvio,cobrado:false}];
    }
    const js=state.jornadas.map(j=>j.id===jaNew.id?jaNew:j);
    save({...state,jornadas:js,jornadaActiva:jaNew});
    return pedido;
  },[state,save]);

  const actualizarPedido=useCallback((pedidoId,cambios)=>{
    if(!state.jornadaActiva)return;
    const ja={...state.jornadaActiva};
    const pedOld=ja.pedidos.find(p=>p.id===pedidoId);
    if(!pedOld)return;

    // Si cambian items, recalcular totales
    let newItems=cambios.items||pedOld.items;
    let newTipo=cambios.tipoEntrega||pedOld.tipoEntrega;
    let newTotalProd=cambios.items?cambios.items.reduce((s,i)=>s+i.subtotal,0):pedOld.totalProductos;
    let newCostoEnvio=(TARIFAS_ENVIO[newTipo]||TARIFAS_ENVIO.recoger).precio;
    let newTotal=newTotalProd+newCostoEnvio;

    // Gestionar mandaditos si cambia tipo de envio
    if(cambios.tipoEntrega&&cambios.tipoEntrega!==pedOld.tipoEntrega){
      const oldEnvio=(TARIFAS_ENVIO[pedOld.tipoEntrega]?.precio||0)>0;
      const newEnvio=(TARIFAS_ENVIO[cambios.tipoEntrega]?.precio||0)>0;
      if(!oldEnvio&&newEnvio){
        ja.mandaditos=[...ja.mandaditos,{id:uid(),pedidoId,pedidoNum:pedOld.numero,
          hora:now(),cliente:cambios.cliente||pedOld.cliente,direccion:cambios.direccion||pedOld.direccion,
          tipo:cambios.tipoEntrega,tarifa:newCostoEnvio,cobrado:false}];
      }else if(oldEnvio&&!newEnvio){
        ja.mandaditos=ja.mandaditos.filter(m=>m.pedidoId!==pedidoId);
      }else if(oldEnvio&&newEnvio){
        ja.mandaditos=ja.mandaditos.map(m=>m.pedidoId===pedidoId?
          {...m,tipo:cambios.tipoEntrega,tarifa:newCostoEnvio,cliente:cambios.cliente||m.cliente,direccion:cambios.direccion||m.direccion}:m);
      }
    }

    const mergedCambios={...cambios,totalProductos:newTotalProd,costoEnvio:newCostoEnvio,total:newTotal};
    ja.pedidos=ja.pedidos.map(p=>p.id===pedidoId?{...p,...mergedCambios}:p);

    // Si se cobra, crear venta y marcar mandadito
    if(cambios.cobrado&&cambios.metodoPago){
      const ped=ja.pedidos.find(p=>p.id===pedidoId);
      if(ped){
        const venta={id:uid(),hora:now(),items:ped.items,total:ped.totalProductos,
          metodoPago:cambios.metodoPago,pedidoId:ped.id};
        ja.ventas=[...ja.ventas,venta];
        ja.mandaditos=ja.mandaditos.map(m=>m.pedidoId===pedidoId?{...m,cobrado:true}:m);
      }
    }
    const js=state.jornadas.map(j=>j.id===ja.id?ja:j);
    save({...state,jornadas:js,jornadaActiva:ja});
  },[state,save]);

  const registrarGasto=useCallback((categoria,descripcion,monto,enEfectivo=true)=>{
    if(!state.jornadaActiva)return;
    const gasto={id:uid(),hora:now(),categoria,descripcion,monto:Number(monto),enEfectivo};
    const ja={...state.jornadaActiva,gastos:[...state.jornadaActiva.gastos,gasto]};
    const js=state.jornadas.map(j=>j.id===ja.id?ja:j);
    save({...state,jornadas:js,jornadaActiva:ja});
  },[state,save]);

  const eliminarGasto=useCallback(gastoId=>{
    if(!state.jornadaActiva)return;
    const ja={...state.jornadaActiva,gastos:state.jornadaActiva.gastos.filter(g=>g.id!==gastoId)};
    const js=state.jornadas.map(j=>j.id===ja.id?ja:j);
    save({...state,jornadas:js,jornadaActiva:ja});
  },[state,save]);

  const actualizarProducto=useCallback((pid,datos)=>{save({...state,productos:state.productos.map(p=>p.id===pid?{...p,...datos}:p)});},[state,save]);
  const actualizarGastoFijo=useCallback((gid,monto)=>{save({...state,gastosFijos:state.gastosFijos.map(g=>g.id===gid?{...g,monto:Number(monto)}:g)});},[state,save]);
  const agregarGastoFijo=useCallback((nombre)=>{const id=uid();save({...state,gastosFijos:[...state.gastosFijos,{id,nombre,monto:0}]});},[state,save]);
  const eliminarGastoFijo=useCallback((gid)=>{save({...state,gastosFijos:state.gastosFijos.filter(g=>g.id!==gid)});},[state,save]);
  const actualizarImpresora=useCallback(datos=>{save({...state,impresora:{...state.impresora,...datos}});},[state,save]);
  const importarProductos=useCallback(prods=>{save({...state,productos:prods});},[state,save]);
  const importarCostos=useCallback(costos=>{save({...state,costos});},[state,save]);
  // Empleados CRUD
  const agregarEmpleado=useCallback((nombre,rol,sueldo)=>{save({...state,empleados:[...state.empleados,{id:uid(),nombre,rol,sueldo:Number(sueldo)||0}]});},[state,save]);
  const editarEmpleado=useCallback((eid,datos)=>{save({...state,empleados:state.empleados.map(e=>e.id===eid?{...e,...datos,sueldo:Number(datos.sueldo)||0}:e)});},[state,save]);
  const eliminarEmpleado=useCallback((eid)=>{save({...state,empleados:state.empleados.filter(e=>e.id!==eid)});},[state,save]);

  return{state,syncStatus,remoteUpdate,abrirJornada,cerrarJornada,crearPedido,actualizarPedido,
    registrarGasto,eliminarGasto,actualizarProducto,actualizarGastoFijo,agregarGastoFijo,eliminarGastoFijo,
    actualizarImpresora,importarProductos,importarCostos,agregarEmpleado,editarEmpleado,eliminarEmpleado};
}

// ─── UTILS ──────────────────────────────────────────────────────────
const fmt=n=>{const v=Number(n||0);return(v<0?'-$':'$')+Math.abs(v).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});};
const fmtDate=iso=>{if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});};
const fmtDateShort=iso=>{if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('es-MX',{day:'numeric',month:'short'});};
const pct=(a,b)=>b>0?((a/b)*100).toFixed(1)+'%':'0%';
const calcVentasTotal=(ventas=[])=>ventas.reduce((s,v)=>s+v.total,0);
const calcGastosTotal=(gastos=[])=>gastos.reduce((s,g)=>s+g.monto,0);
const calcMandaditosTotal=(mandaditos=[])=>mandaditos.reduce((s,m)=>s+m.tarifa,0);

// ─── INTELLIGENCE ENGINE ────────────────────────────────────────────
function analyzeHistorico(jornadas,productos){
  const cerradas=jornadas.filter(j=>j.estado==='cerrada');
  if(!cerradas.length)return null;

  // Analisis por dia de la semana
  const porDia={};
  cerradas.forEach(j=>{
    const d=new Date(j.fecha+'T12:00:00');
    const dia=d.toLocaleDateString('es-MX',{weekday:'long'});
    if(!porDia[dia])porDia[dia]={ventas:0,pedidos:0,count:0};
    porDia[dia].ventas+=calcVentasTotal(j.ventas);
    porDia[dia].pedidos+=(j.pedidos||[]).filter(p=>p.estado!=='cancelado').length;
    porDia[dia].count++;
  });

  // Mejor y peor dia
  const dias=Object.entries(porDia).map(([d,v])=>({dia:d,promVentas:v.ventas/v.count,promPedidos:v.pedidos/v.count,count:v.count}));
  dias.sort((a,b)=>b.promVentas-a.promVentas);
  const mejorDia=dias[0]||null;
  const peorDia=dias[dias.length-1]||null;

  // Tendencia (ultimas 3 vs anteriores)
  const ultimas3=cerradas.slice(-3);
  const anteriores=cerradas.slice(0,-3);
  const promUlt=ultimas3.length?ultimas3.reduce((s,j)=>s+calcVentasTotal(j.ventas),0)/ultimas3.length:0;
  const promAnt=anteriores.length?anteriores.reduce((s,j)=>s+calcVentasTotal(j.ventas),0)/anteriores.length:0;
  const tendencia=promAnt>0?((promUlt-promAnt)/promAnt*100):0;

  // Productos top por volumen y por rentabilidad
  const stats=getProductoStats(jornadas,productos);
  const topVolumen=stats.filter(s=>s.cantidad>0).sort((a,b)=>b.cantidad-a.cantidad).slice(0,5);
  const topRentable=stats.filter(s=>s.cantidad>0&&s.precio>0).map(s=>({...s,margen:((s.precio-s.costo)/s.precio*100)})).sort((a,b)=>b.margen-a.margen).slice(0,5);
  const topRevenue=stats.filter(s=>s.cantidad>0).sort((a,b)=>b.revenue-a.revenue).slice(0,5);

  // Hora pico (basado en hora de pedidos)
  const horaCounts={};
  cerradas.forEach(j=>(j.pedidos||[]).forEach(p=>{
    if(p.estado!=='cancelado'&&p.hora){
      const h=p.hora.split(':')[0];
      horaCounts[h]=(horaCounts[h]||0)+1;
    }
  }));
  const horaPico=Object.entries(horaCounts).sort((a,b)=>b[1]-a[1])[0];

  // Tasa de envio vs recoger
  const totalPedidos=cerradas.reduce((s,j)=>s+(j.pedidos||[]).filter(p=>p.estado!=='cancelado').length,0);
  const totalEnvios=cerradas.reduce((s,j)=>s+(j.pedidos||[]).filter(p=>p.tipoEntrega!=='recoger'&&p.estado!=='cancelado').length,0);
  const tasaEnvio=totalPedidos>0?(totalEnvios/totalPedidos*100):0;

  // Ticket promedio
  const allVentas=cerradas.flatMap(j=>j.ventas);
  const ticketProm=allVentas.length?allVentas.reduce((s,v)=>s+v.total,0)/allVentas.length:0;

  // Generar insights inteligentes
  const insights=[];
  if(mejorDia)insights.push({icon:'📅',type:'info',text:`Tu mejor dia es ${mejorDia.dia} con promedio de ${fmt(mejorDia.promVentas)} en ventas.`});
  if(peorDia&&peorDia.dia!==mejorDia?.dia)insights.push({icon:'📉',type:'warn',text:`${peorDia.dia} es tu dia mas bajo (${fmt(peorDia.promVentas)} prom). Considera promociones especiales.`});
  if(tendencia>10)insights.push({icon:'🚀',type:'ok',text:`Tendencia positiva: ventas subieron ${tendencia.toFixed(0)}% vs jornadas anteriores.`});
  else if(tendencia<-10)insights.push({icon:'⚠️',type:'warn',text:`Alerta: ventas bajaron ${Math.abs(tendencia).toFixed(0)}% en las ultimas jornadas.`});
  if(topVolumen[0])insights.push({icon:'⭐',type:'info',text:`${topVolumen[0].emoji} ${topVolumen[0].nombre} es el mas pedido (${topVolumen[0].cantidad} pz). Nunca te quedes sin stock.`});
  if(topRentable[0])insights.push({icon:'💎',type:'ok',text:`${topRentable[0].emoji} ${topRentable[0].nombre} tiene el mejor margen (${topRentable[0].margen.toFixed(0)}%). Promocionalo mas.`});
  if(tasaEnvio>50)insights.push({icon:'🛵',type:'info',text:`${tasaEnvio.toFixed(0)}% de pedidos son envios. Evalua ajustar tarifas o agregar repartidor.`});
  if(horaPico)insights.push({icon:'⏰',type:'info',text:`Hora pico: ${horaPico[0]}:00 hrs (${horaPico[1]} pedidos). Asegura personal suficiente.`});
  if(ticketProm>0)insights.push({icon:'🧾',type:'info',text:`Ticket promedio: ${fmt(ticketProm)}. Considera combos para subirlo.`});

  return{porDia:dias,mejorDia,peorDia,tendencia,topVolumen,topRentable,topRevenue,horaPico,tasaEnvio,ticketProm,insights,totalJornadas:cerradas.length};
}

// ─── PDF GENERATOR ──────────────────────────────────────────────────
function generarPDF(tipo,jornadas,productos){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'letter'});
  const W=doc.internal.pageSize.getWidth();
  const now=new Date();
  let y=15;

  const addHeader=()=>{
    doc.setFontSize(18);doc.setFont('helvetica','bold');
    doc.text("K'apul'Its",W/2,y,{align:'center'});y+=6;
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text('Birria y algo mas - Reporte '+tipo.toUpperCase(),W/2,y,{align:'center'});y+=4;
    doc.text('Generado: '+now.toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'}),W/2,y,{align:'center'});y+=8;
    doc.setDrawColor(234,88,12);doc.setLineWidth(0.5);doc.line(15,y,W-15,y);y+=6;
  };

  const addSection=(title)=>{
    if(y>250){doc.addPage();y=15;}
    doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(234,88,12);
    doc.text(title,15,y);y+=6;doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');doc.setFontSize(9);
  };

  const addRow=(label,value,bold=false)=>{
    if(y>270){doc.addPage();y=15;}
    doc.setFont('helvetica',bold?'bold':'normal');
    doc.text(label,18,y);doc.text(String(value),W-18,y,{align:'right'});y+=5;
  };

  // Filtrar jornadas por periodo
  let cerradas=jornadas.filter(j=>j.estado==='cerrada');
  let periodoLabel='';
  if(tipo==='mensual'){
    const mes=now.getMonth(),anio=now.getFullYear();
    cerradas=cerradas.filter(j=>{const d=new Date(j.fecha+'T12:00:00');return d.getMonth()===mes&&d.getFullYear()===anio;});
    periodoLabel=now.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  }else{
    const trimestre=Math.floor(now.getMonth()/3);
    const mesInicio=trimestre*3;
    cerradas=cerradas.filter(j=>{const d=new Date(j.fecha+'T12:00:00');return d.getMonth()>=mesInicio&&d.getMonth()<mesInicio+3&&d.getFullYear()===now.getFullYear();});
    periodoLabel=`Q${trimestre+1} ${now.getFullYear()} (${['Ene-Mar','Abr-Jun','Jul-Sep','Oct-Dic'][trimestre]})`;
  }

  addHeader();

  // Periodo
  addSection('Periodo: '+periodoLabel);
  addRow('Jornadas registradas',cerradas.length);y+=3;

  if(!cerradas.length){
    doc.setFontSize(11);doc.text('Sin jornadas cerradas en este periodo.',W/2,y+10,{align:'center'});
    doc.save(`kapulits_${tipo}_${now.toISOString().slice(0,10)}.pdf`);return;
  }

  // Resumen financiero
  const tv=cerradas.reduce((s,j)=>s+calcVentasTotal(j.ventas),0);
  const tg=cerradas.reduce((s,j)=>s+calcGastosTotal(j.gastos),0);
  const tu=tv-tg;
  const tm=cerradas.reduce((s,j)=>s+calcMandaditosTotal(j.mandaditos||[]),0);
  const margen=tv>0?((tu/tv)*100).toFixed(1):'0';

  addSection('Resumen Financiero');
  addRow('Total Ventas (productos)',fmt(tv),true);
  addRow('Total Gastos',fmt(tg));
  addRow('Utilidad Bruta',fmt(tu),true);
  addRow('Margen de Utilidad',margen+'%');
  addRow('Mandaditos (ingreso aparte)',fmt(tm));
  addRow('Promedio por jornada',fmt(tv/cerradas.length));y+=3;

  // Desglose por jornada
  addSection('Desglose por Jornada');
  cerradas.forEach(j=>{
    const v=calcVentasTotal(j.ventas);const g=calcGastosTotal(j.gastos);
    addRow(`${j.fecha} (${(j.pedidos||[]).length} pedidos)`,`${fmt(v)} | Util: ${fmt(v-g)}`);
  });y+=3;

  // Top productos
  const stats=getProductoStats(cerradas.map(j=>({...j})),productos);
  const topProds=stats.filter(s=>s.cantidad>0).slice(0,10);
  if(topProds.length){
    addSection('Top Productos');
    topProds.forEach((s,i)=>{
      const m=s.precio>0?((s.precio-s.costo)/s.precio*100).toFixed(0):'0';
      addRow(`#${i+1} ${s.nombre} (${s.cantidad} pz, margen ${m}%)`,fmt(s.revenue));
    });y+=3;
  }

  // Inteligencia
  const intel=analyzeHistorico(cerradas,productos);
  if(intel?.insights.length){
    addSection('Recomendaciones Inteligentes');
    intel.insights.forEach(r=>{
      if(y>270){doc.addPage();y=15;}
      const lines=doc.splitTextToSize('- '+r.text,W-36);
      doc.text(lines,18,y);y+=lines.length*4+2;
    });
  }

  // Footer
  y+=5;if(y>260){doc.addPage();y=15;}
  doc.setDrawColor(234,88,12);doc.setLineWidth(0.3);doc.line(15,y,W-15,y);y+=5;
  doc.setFontSize(8);doc.setTextColor(150);
  doc.text("K'apul'Its - "+NEGOCIO.direccion+' - Tel: '+NEGOCIO.telefono,W/2,y,{align:'center'});

  doc.save(`kapulits_${tipo}_${now.toISOString().slice(0,10)}.pdf`);
}

// ─── PRINTER SANITIZER (ASCII for 58mm thermal) ────────────────────
const ACCENT_MAP={'á':'a','é':'e','í':'i','ó':'o','ú':'u','ñ':'n','Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U','Ñ':'N',
  '¡':'!','¿':'?','ü':'u','Ü':'U','à':'a','è':'e','ì':'i','ò':'o','ù':'u','\u2019':"'"};
const EMOJI_MAP={'🛵':'ENV','🚗':'ENV','🏃':'REC','📍':'Dir:','📝':'Nota:','🙏':'','💰':'$','✅':'OK',
  '🍲':'','🌮':'','🫓':'','🧀':'','🥙':'','🫔':'','🥪':'','🍜':'','🥤':'','🍹':'','🥛':'','🧪':'',
  '🎉':'','🌟':'','━':'-','─':'-','│':'|'};

function sanitize(text){
  let r='';
  for(const ch of text){
    if(ACCENT_MAP[ch]!==undefined){r+=ACCENT_MAP[ch];}
    else if(EMOJI_MAP[ch]!==undefined){r+=EMOJI_MAP[ch];}
    else if(ch.codePointAt(0)<128){r+=ch;}
  }
  return r;
}

function getProductoStats(jornadas,productos){
  const stats={};
  productos.forEach(p=>{stats[p.id]={id:p.id,nombre:p.nombre,precio:p.precio,costo:p.costo,emoji:p.emoji,cantidad:0,revenue:0};});
  jornadas.forEach(j=>{j.ventas.forEach(v=>{v.items.forEach(item=>{
    if(stats[item.productoId]){stats[item.productoId].cantidad+=item.cantidad;stats[item.productoId].revenue+=item.subtotal;}
  });});});
  return Object.values(stats).sort((a,b)=>b.revenue-a.revenue);
}

function calcProjections(jornadas){
  const cerradas=jornadas.filter(j=>j.estado==='cerrada');
  if(!cerradas.length)return null;
  const revenues=cerradas.map(j=>calcVentasTotal(j.ventas));
  const expenses=cerradas.map(j=>calcGastosTotal(j.gastos));
  const profits=revenues.map((r,i)=>r-expenses[i]);
  const mandas=cerradas.map(j=>calcMandaditosTotal(j.mandaditos||[]));
  const recoger=cerradas.map(j=>(j.pedidos||[]).filter(p=>p.tipoEntrega==='recoger'&&p.estado!=='cancelado').length);
  const envios=cerradas.map(j=>(j.pedidos||[]).filter(p=>p.tipoEntrega!=='recoger'&&p.estado!=='cancelado').length);
  const avg=a=>a.reduce((s,v)=>s+v,0)/a.length;
  const avgR=avg(revenues),avgE=avg(expenses),avgP=avg(profits),avgM=avg(mandas);
  const margin=avgR>0?(avgP/avgR*100):0;
  return{jornadasCount:cerradas.length,avgRevenue:avgR,avgExpenses:avgE,avgProfit:avgP,margin,
    projRevenue:avgR*4,projExpenses:avgE*4,projProfit:avgP*4,
    revenues,expenses,profits,mandas,dates:cerradas.map(j=>j.fecha),
    avgMandaditos:avgM,projMandaditos:avgM*4,
    totalRecoger:recoger.reduce((a,b)=>a+b,0),totalEnvios:envios.reduce((a,b)=>a+b,0)};
}

function getRecomendaciones(proj,stats){
  if(!proj)return[];const recs=[];
  if(proj.margin<25)recs.push({type:'warn',icon:'⚠️',text:`Margen de utilidad: ${proj.margin.toFixed(1)}%. Revisa costos o ajusta precios.`});
  else if(proj.margin>50)recs.push({type:'ok',icon:'🌟',text:`Excelente! Margen del ${proj.margin.toFixed(1)}%.`});
  else recs.push({type:'ok',icon:'✅',text:`Margen de ${proj.margin.toFixed(1)}% saludable.`});
  const top=stats.filter(s=>s.cantidad>0).sort((a,b)=>b.cantidad-a.cantidad)[0];
  if(top)recs.push({type:'info',icon:'⭐',text:`Producto estrella: ${top.emoji} ${top.nombre} (${top.cantidad} pz). Asegura stock!`});
  const mp=stats.filter(s=>s.cantidad>0&&s.precio>0).map(s=>({...s,m:(s.precio-s.costo)/s.precio*100})).sort((a,b)=>b.m-a.m)[0];
  if(mp)recs.push({type:'info',icon:'💡',text:`Mayor rentabilidad: ${mp.emoji} ${mp.nombre} con ${mp.m.toFixed(0)}% margen. Promuevelo!`});
  recs.push({type:'info',icon:'📈',text:`Proyeccion mensual (4 jornadas): ${fmt(proj.projRevenue)} ventas, ${fmt(proj.projProfit)} utilidad.`});
  if(proj.totalEnvios>0||proj.totalRecoger>0){
    recs.push({type:'info',icon:'🛵',text:`Envios: ${proj.totalEnvios} - Recogen: ${proj.totalRecoger}. Mandaditos proyectados: ${fmt(proj.projMandaditos)}/mes.`});
  }
  return recs;
}

// ─── PRINTER ────────────────────────────────────────────────────────
let printerCharacteristic=null;
let _btDevice=null;
let _keepaliveTimer=null;
let _reconnectTimer=null;
let _reconnectAttempt=0;
let _onPrinterStateChange=null;
const BT_SERVICES=['000018f0-0000-1000-8000-00805f9b34fb','e7810a71-73ae-499d-8c15-faa9aef0c3f2','49535343-fe7d-4ae5-8fa9-9fafd205e455'];

async function _findCharacteristic(server){
  let service;
  for(const sid of BT_SERVICES){try{service=await server.getPrimaryService(sid);break;}catch(e){}}
  if(!service){const svcs=await server.getPrimaryServices();if(svcs.length)service=svcs[0];}
  if(service){const chars=await service.getCharacteristics();
    return chars.find(c=>c.properties.write||c.properties.writeWithoutResponse)||chars[0];}
  return null;
}

// Keepalive: NULL byte que las impresoras ESC/POS descartan silenciosamente.
// Mantiene el canal GATT vivo y evita que Android duerma la conexion.
function _startKeepalive(){
  _stopKeepalive();
  _keepaliveTimer=setInterval(async()=>{
    if(!printerCharacteristic)return;
    try{await printerCharacteristic.writeValue(new Uint8Array([0x00]));}
    catch(e){/* si falla, el evento disconnect dispara reconexion */}
  },25000);
}
function _stopKeepalive(){if(_keepaliveTimer){clearInterval(_keepaliveTimer);_keepaliveTimer=null;}}

function _handleDisconnect(){
  printerCharacteristic=null;
  _stopKeepalive();
  if(_onPrinterStateChange)_onPrinterStateChange({conectada:false,reconectando:true});
  _reconnectAttempt=0;
  _scheduleReconnect();
}

function _scheduleReconnect(){
  if(_reconnectTimer)clearTimeout(_reconnectTimer);
  _reconnectAttempt++;
  if(_reconnectAttempt>8){
    if(_onPrinterStateChange)_onPrinterStateChange({conectada:false,reconectando:false});
    return;
  }
  const delay=Math.min(1000*Math.pow(2,_reconnectAttempt-1),20000);
  _reconnectTimer=setTimeout(async()=>{
    const ok=await reconnectBluetooth();
    if(ok){
      _reconnectAttempt=0;
      _startKeepalive();
      if(_onPrinterStateChange)_onPrinterStateChange({conectada:true,reconectando:false});
    } else {
      _scheduleReconnect();
    }
  },delay);
}

async function connectBluetooth(){
  try{
    const device=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:BT_SERVICES});
    _btDevice=device;
    device.addEventListener('gattserverdisconnected',_handleDisconnect);
    const server=await device.gatt.connect();
    printerCharacteristic=await _findCharacteristic(server);
    if(printerCharacteristic)_startKeepalive();
    return{success:true,name:device.name||'Impresora BT'};
  }catch(e){return{success:false,error:e.message};}
}

async function reconnectBluetooth(){
  // Intento 1: reconectar dispositivo guardado en memoria
  if(_btDevice&&!_btDevice.gatt.connected){
    try{
      const server=await _btDevice.gatt.connect();
      printerCharacteristic=await _findCharacteristic(server);
      if(printerCharacteristic){_startKeepalive();return true;}
    }catch(e){}
  }
  // Intento 2: buscar dispositivos previamente pareados (Chrome 85+)
  if(navigator.bluetooth?.getDevices){
    try{
      const devices=await navigator.bluetooth.getDevices();
      for(const dev of devices){
        try{
          const server=await dev.gatt.connect();
          _btDevice=dev;
          dev.addEventListener('gattserverdisconnected',_handleDisconnect);
          printerCharacteristic=await _findCharacteristic(server);
          if(printerCharacteristic){_startKeepalive();return true;}
        }catch(e){}
      }
    }catch(e){}
  }
  return false;
}

// Auto-conectar al arrancar la app sin mostrar prompt (usa dispositivos ya autorizados)
async function tryAutoConnectPrinter(){
  if(!navigator.bluetooth?.getDevices)return false;
  try{
    const devices=await navigator.bluetooth.getDevices();
    if(!devices.length)return false;
    return await reconnectBluetooth();
  }catch(e){return false;}
}

function _buildBTText(pedido){
  const tarifa=TARIFAS_ENVIO[pedido.tipoEntrega]||TARIFAS_ENVIO.recoger;
  const sep='-'.repeat(32);
  let t=`\n      K'apul'Its\n    Birria y algo mas\n${sep}\n`;
  t+=`  PEDIDO #${String(pedido.numero).padStart(3,'0')}\n  ${pedido.fecha}  ${pedido.hora}\n`;
  if(pedido.cliente)t+=`  Cliente: ${pedido.cliente}\n`;
  const tipoTxt=pedido.tipoEntrega==='recoger'?'REC':'ENV';
  t+=`  ${tipoTxt} ${tarifa.label}\n`;
  if(pedido.direccion&&pedido.tipoEntrega!=='recoger')t+=`  Dir: ${pedido.direccion}\n`;
  t+=sep+'\n';
  pedido.items.forEach(i=>{
    const nom=i.nombre.substring(0,18).padEnd(18);
    t+=` ${String(i.cantidad).padStart(2)}x ${nom} ${fmt(i.subtotal).padStart(7)}\n`;
  });
  t+=sep+'\n';
  if(pedido.notas){
    t+=`  Notas:\n`;
    const words=String(pedido.notas).split(/\s+/);
    let line='';
    for(const w of words){
      if((line+' '+w).trim().length>30){
        t+=`  ${line.trim()}\n`;
        line=w;
      } else {
        line=(line?line+' ':'')+w;
      }
    }
    if(line)t+=`  ${line.trim()}\n`;
    t+=sep+'\n';
  }
  if(pedido.costoEnvio>0)t+=`  Envio:        ${fmt(pedido.costoEnvio).padStart(10)}\n`;
  t+=`  TOTAL:        ${fmt(pedido.total).padStart(10)}\n${sep}\n`;
  t+=`  ${NEGOCIO.direccion}\n  Tel.: ${NEGOCIO.telefono}\n  Gracias por tu compra!\n\n\n`;
  return sanitize(t);
}

async function _sendToBT(text){
  const data=new Uint8Array([...text].map(c=>c.charCodeAt(0)&0x7F));
  for(let i=0;i<data.length;i+=100){await printerCharacteristic.writeValue(data.slice(i,i+100));}
}

async function printTicket(pedido){
  // Si no hay conexion BT activa, intentar reconectar silenciosamente
  if(!printerCharacteristic&&(_btDevice||navigator.bluetooth?.getDevices)){
    await reconnectBluetooth();
  }
  // Imprimir por Bluetooth si hay conexion
  if(printerCharacteristic){
    try{
      await _sendToBT(_buildBTText(pedido));
      return{success:true,method:'bluetooth'};
    }catch(e){
      // Si fallo, la conexion murio — intentar reconectar una vez mas
      printerCharacteristic=null;
      const ok=await reconnectBluetooth();
      if(ok){
        try{
          await _sendToBT(_buildBTText(pedido));
          return{success:true,method:'bluetooth'};
        }catch(e2){}
      }
    }
  }
  // Fallback: mostrar preview en-app (sin ventana ni dialogo de impresion)
  if(_showTicketPreview)_showTicketPreview(pedido);
  return{success:true,method:'preview'};
}

function LineChart({dates=[],revenues=[],profits=[]}){
  if(revenues.length<2)return null;const allV=[...revenues,...profits];const max=Math.max(...allV,1);const min=Math.min(...profits,0);

  const pt=(v,i)=>`${i*(W/(dates.length-1||1))},${H-((v-min)/range)*(H-20)+10}`;
  return(<div className="overflow-x-auto"><svg width={W} height={H+30} style={{minWidth:'100%'}}>
    <polyline points={revenues.map((v,i)=>pt(v,i)).join(' ')} fill="none" stroke="#f97316" strokeWidth={2.5} strokeLinejoin="round"/>
    <polyline points={profits.map((v,i)=>pt(v,i)).join(' ')} fill="none" stroke="#22c55e" strokeWidth={2.5} strokeLinejoin="round" strokeDasharray="4,3"/>
    {revenues.map((v,i)=><circle key={'r'+i} cx={i*(W/(dates.length-1||1))} cy={H-((v-min)/range)*(H-20)+10} r={4} fill="#f97316"/>)}
    {profits.map((v,i)=><circle key={'p'+i} cx={i*(W/(dates.length-1||1))} cy={H-((v-min)/range)*(H-20)+10} r={4} fill="#22c55e"/>)}
    {dates.map((d,i)=><text key={i} x={i*(W/(dates.length-1||1))} y={H+20} textAnchor="middle" fontSize={9} fill="#6b7280">{fmtDateShort(d)}</text>)}
  </svg></div>);
}

// ─── PRODUCT SELECTOR (shared by Create & Edit) ─────────────────────
function ProductSelector({productos,cart,setCart}){
  const prods=productos.filter(p=>p.activo);
  const platillos=prods.filter(p=>p.cat==='platillo');
  const combos=prods.filter(p=>p.cat==='combo');
  const bebidas=prods.filter(p=>p.cat==='bebida');
  const add=p=>setCart(c=>({...c,[p.id]:{...p,productoId:p.id,cantidad:(c[p.id]?.cantidad||0)+1,subtotal:((c[p.id]?.cantidad||0)+1)*p.precio}}));
  const rem=pid=>setCart(c=>{const n={...c};if(n[pid]?.cantidad>1){n[pid]={...n[pid],cantidad:n[pid].cantidad-1,subtotal:(n[pid].cantidad-1)*n[pid].precio};}else{delete n[pid];}return n;});

  function ProdBtn({p,cols=2}){
    const qty=cart[p.id]?.cantidad||0;
    const desc=COMBO_DESC[p.id];
    return(<button key={p.id} onClick={()=>add(p)}
      className={`relative bg-white rounded-xl ${cols===1?'p-4 flex items-center gap-3':'p-3 text-left'} shadow-sm border-2 card-press ${qty>0?'border-orange-400 bg-orange-50':'border-gray-100'}`}>
      {qty>0&&<span className="absolute top-1 right-1 bg-orange-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center">{qty}</span>}
      <div className={cols===1?'text-3xl':'text-2xl mb-1'}>{p.emoji}</div>
      <div className={cols===1?'flex-1':''}>
        <p className="text-xs font-bold text-gray-800 leading-tight">{p.nombre}</p>
        {desc&&<p className="text-[10px] text-gray-400 mt-0.5 leading-snug">{desc}</p>}
        <p className="text-orange-600 font-black text-sm">{fmt(p.precio)}</p>
      </div>
    </button>);
  }

  return(<React.Fragment>
    {combos.length>0&&(<React.Fragment>
      <p className="text-xs font-bold text-gray-500 uppercase tracking-wider">🎉 Combos</p>
      <div className="grid grid-cols-1 gap-2">{combos.map(p=><ProdBtn key={p.id} p={p} cols={1}/>)}</div>
    </React.Fragment>)}
    <p className="text-xs font-bold text-gray-500 uppercase tracking-wider">🥩 Platillos</p>
    <div className="grid grid-cols-2 gap-2">{platillos.map(p=><ProdBtn key={p.id} p={p}/>)}</div>
    <p className="text-xs font-bold text-gray-500 uppercase tracking-wider">🥤 Bebidas</p>
    <div className="grid grid-cols-3 gap-2">
      {bebidas.map(p=>{const qty=cart[p.id]?.cantidad||0;
        return(<button key={p.id} onClick={()=>add(p)}
          className={`relative bg-white rounded-xl p-2 text-center shadow-sm border-2 card-press ${qty>0?'border-orange-400 bg-orange-50':'border-gray-100'}`}>
          {qty>0&&<span className="absolute top-0 right-0 bg-orange-500 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center">{qty}</span>}
          <div className="text-xl">{p.emoji}</div>
          <p className="text-[10px] font-bold text-gray-700">{p.nombre}</p>
          <p className="text-orange-600 font-black text-xs">{fmt(p.precio)}</p>
        </button>);})}
    </div>
  </React.Fragment>);
}

function CartSummary({cart,costoEnvio,onAdd,onRem}){
  const items=Object.values(cart);
  const totalProd=items.reduce((s,i)=>s+i.subtotal,0);
  const totalFinal=totalProd+costoEnvio;
  if(!items.length)return null;
  return(<div className="bg-orange-50 rounded-2xl p-3 space-y-1">
    {items.map(i=>(<div key={i.id||i.productoId} className="flex items-center justify-between">
      <span className="text-xs text-gray-600">{i.emoji} {i.nombre}</span>
      <div className="flex items-center gap-2">
        <button onClick={()=>onRem(i.id||i.productoId)} className="w-6 h-6 rounded-full bg-gray-200 text-gray-700 font-black text-xs flex items-center justify-center">-</button>
        <span className="font-black text-xs w-4 text-center">{i.cantidad}</span>
        <button onClick={()=>onAdd(i)} className="w-6 h-6 rounded-full bg-orange-500 text-white font-black text-xs flex items-center justify-center">+</button>
        <span className="font-bold text-xs w-12 text-right">{fmt(i.subtotal)}</span>
      </div></div>))}
    <div className="border-t border-orange-200 pt-2 mt-2 space-y-1">
      <div className="flex justify-between text-xs"><span className="text-gray-600">Productos</span><span className="font-bold">{fmt(totalProd)}</span></div>
      {costoEnvio>0&&<div className="flex justify-between text-xs"><span className="text-purple-600">🛵 Costo envio</span><span className="font-bold text-purple-600">{fmt(costoEnvio)}</span></div>}
      <div className="flex justify-between"><span className="font-black text-gray-800">TOTAL</span><span className="text-xl font-black text-orange-600">{fmt(totalFinal)}</span></div>

}

// ─── PEDIDOS ────────────────────────────────────────────────────────
function PedidosPage({state,onCrearPedido,onActualizarPedido}){
  const [showCrear,setShowCrear]=useState(false);const [showCobrar,setShowCobrar]=useState(null);
  const [showEditar,setShowEditar]=useState(null);const [confirmCancel,setConfirmCancel]=useState(null);
  const ja=state.jornadaActiva;
  if(!ja)return(<div className="safe-bottom"><TopBar title="Pedidos 📋"/>
    <EmptyState emoji="🔒" title="Jornada no iniciada" sub="Ve a Inicio y abre la jornada para crear pedidos"/></div>);
  const pedidos=ja.pedidos||[];
  const nuevos=pedidos.filter(p=>p.estado==='nuevo');
  const entregados=pedidos.filter(p=>p.estado==='entregado'&&!p.cobrado);
  const cobrados=pedidos.filter(p=>p.cobrado);
  const cancelados=pedidos.filter(p=>p.estado==='cancelado');
  return(<div className="safe-bottom">
    <TopBar title="Pedidos 📋" subtitle={`${nuevos.length} activos · ${cobrados.length} cobrados`}/>
    <div className="px-4 py-4 space-y-4">
      <Btn full size="lg" onClick={()=>setShowCrear(true)}>+ Nuevo Pedido</Btn>
      {nuevos.length>0&&(<div className="fade-in">
        <p className="text-xs font-bold text-yellow-600 uppercase tracking-wider mb-2">🟡 Nuevos ({nuevos.length})</p>
        <div className="space-y-3">{nuevos.map(p=>(
          <PedidoCard key={p.id} pedido={p}
            onEntregar={()=>onActualizarPedido(p.id,{estado:'entregado'})}
            onCobrar={()=>setShowCobrar(p)}
            onCancelar={()=>setConfirmCancel(p)}
            onEditar={()=>setShowEditar(p)}
            onPrint={()=>printTicket(p)}
            onWhatsApp={()=>shareWhatsApp(p)}/>))}</div></div>)}
      {entregados.length>0&&(<div>
        <p className="text-xs font-bold text-green-600 uppercase tracking-wider mb-2">🟢 Entregados sin cobrar ({entregados.length})</p>
        <div className="space-y-3">{entregados.map(p=>(
          <PedidoCard key={p.id} pedido={p} onCobrar={()=>setShowCobrar(p)} onPrint={()=>printTicket(p)}
            onWhatsApp={()=>shareWhatsApp(p)} showEntregar={false}/>))}</div></div>)}
      {cobrados.length>0&&(<div>
        <p className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-2">✅ Cobrados ({cobrados.length})</p>
        <div className="space-y-2">{cobrados.map(p=>(
          <div key={p.id} className="bg-white rounded-xl p-3 shadow-sm border border-green-100">
            <div className="flex justify-between items-center">
              <div><span className="text-xs font-bold text-gray-600">#{String(p.numero).padStart(3,'0')} · {p.hora}</span>
                {p.cliente&&<span className="text-xs text-gray-400"> · {p.cliente}</span>}</div>
              <div className="flex items-center gap-1">
                <Badge color="green">{fmt(p.totalProductos)}</Badge>
                {p.costoEnvio>0&&<Badge color="purple">🛵{fmt(p.costoEnvio)}</Badge>}
                <Badge color={p.metodoPago==='efectivo'?'green':'blue'}>{p.metodoPago==='efectivo'?'💵':'📱'}</Badge>
              </div></div>
          </div>))}</div></div>)}
      {cancelados.length>0&&(<div>
        <p className="text-xs font-bold text-red-500 uppercase tracking-wider mb-2">🔴 Cancelados ({cancelados.length})</p>
        <div className="space-y-2">{cancelados.map(p=>(
          <div key={p.id} className="bg-red-50 rounded-xl p-3 border border-red-100 flex justify-between items-center">
            <span className="text-xs font-bold text-gray-500 line-through">#{String(p.numero).padStart(3,'0')} · {p.cliente||'—'} · {fmt(p.total)}</span>
            <button onClick={()=>onActualizarPedido(p.id,{estado:'nuevo'})}
              className="text-xs font-bold text-orange-500 bg-orange-50 px-2 py-1 rounded-lg border border-orange-200" aria-label="Restaurar pedido">↩ Restaurar</button>
          </div>))}</div></div>)}
      {pedidos.length===0&&<EmptyState emoji="📋" title="Sin pedidos" sub="Crea tu primer pedido del dia"/>}
      <CrearPedidoModal open={showCrear} onClose={()=>setShowCrear(false)} productos={state.productos}
        impresora={state.impresora}
        onCrear={(items,tipo,cliente,dir,notas)=>{
          const p=onCrearPedido(items,tipo,cliente,dir,notas);
          if(p&&state.impresora.autoImprimir)printTicket(p);
          setShowCrear(false);}}/>
      <CobrarModal open={!!showCobrar} pedido={showCobrar} onClose={()=>setShowCobrar(null)}
        onCobrar={metodo=>{onActualizarPedido(showCobrar.id,{cobrado:true,metodoPago:metodo,estado:'entregado'});setShowCobrar(null);}}/>
      {showEditar&&<EditarPedidoModal open={!!showEditar} pedido={showEditar} productos={state.productos}
        onClose={()=>setShowEditar(null)}
        onGuardar={cambios=>{onActualizarPedido(showEditar.id,cambios);setShowEditar(null);}}/>}
      <Modal open={!!confirmCancel} onClose={()=>setConfirmCancel(null)} title="⚠️ Cancelar pedido">
        {confirmCancel&&(<div className="space-y-4">
          <div className="bg-red-50 rounded-2xl p-4 text-center">

            <p className="text-sm text-gray-600 mt-1">{confirmCancel.cliente||'Sin nombre'} · {fmt(confirmCancel.total)}</p>

            <Btn full color="gray" onClick={()=>setConfirmCancel(null)}>No, volver</Btn>

          </div>
        </div>)}
      </Modal>
    </div>
  </div>);
}

function shareWhatsApp(pedido){
  const tarifa=TARIFAS_ENVIO[pedido.tipoEntrega]||TARIFAS_ENVIO.recoger;
  let msg=`*K'apul'Its* - Pedido #${String(pedido.numero).padStart(3,'0')}\n`;
  msg+=`${pedido.fecha} · ${pedido.hora}\n`;
  if(pedido.cliente)msg+=`Cliente: ${pedido.cliente}\n`;
  msg+=`${tarifa.emoji} ${tarifa.label}\n`;
  if(pedido.direccion&&pedido.tipoEntrega!=='recoger')msg+=`Dir: ${pedido.direccion}\n`;
  msg+=`---\n`;
  pedido.items.forEach(i=>{msg+=`${i.cantidad}x ${i.nombre} - ${fmt(i.subtotal)}\n`;});
  msg+=`---\n`;
  if(pedido.costoEnvio>0)msg+=`Envio: ${fmt(pedido.costoEnvio)}\n`;
  msg+=`*TOTAL: ${fmt(pedido.total)}*\n`;
  if(pedido.notas)msg+=`Nota: ${pedido.notas}\n`;
  msg+=`\nTel.: ${NEGOCIO.telefono}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}

      {pedido.estado==='nuevo'&&!pedido.cobrado&&onEditar&&<Btn size="sm" color="orange" variant="outline" onClick={onEditar}>✏️ Editar</Btn>}
      {pedido.estado==='nuevo'&&onCancelar&&<Btn size="sm" color="red" variant="outline" onClick={onCancelar} aria-label="Cancelar pedido">✕</Btn>}
      {onPrint&&<Btn size="sm" color="gray" onClick={onPrint} aria-label="Imprimir ticket">🖨️</Btn>}
      {onWhatsApp&&<Btn size="sm" color="green" variant="outline" onClick={onWhatsApp} aria-label="Compartir por WhatsApp">📲</Btn>}
    </div>
  </div>);
}

function CrearPedidoModal({open,onClose,productos,impresora,onCrear}){
  const [cart,setCart]=useState({});const [tipo,setTipo]=useState('recoger');
  const [cliente,setCliente]=useState('');const [direccion,setDireccion]=useState('');const [notas,setNotas]=useState('');
  const items=Object.values(cart);const totalProd=items.reduce((s,i)=>s+i.subtotal,0);
  const costoEnvio=(TARIFAS_ENVIO[tipo]||TARIFAS_ENVIO.recoger).precio;
  const totalFinal=totalProd+costoEnvio;
  const add=p=>setCart(c=>({...c,[p.id]:{...p,productoId:p.id,cantidad:(c[p.id]?.cantidad||0)+1,subtotal:((c[p.id]?.cantidad||0)+1)*p.precio}}));
  const rem=pid=>setCart(c=>{const n={...c};if(n[pid]?.cantidad>1){n[pid]={...n[pid],cantidad:n[pid].cantidad-1,subtotal:(n[pid].cantidad-1)*n[pid].precio};}else{delete n[pid];}return n;});
  const crear=()=>{
    if(!items.length)return;

      <ProductSelector productos={productos} cart={cart} setCart={setCart}/>

// ─── GASTOS ─────────────────────────────────────────────────────────
function GastosPage({state,onRegistrar,onEliminar}){
  const [catSel,setCatSel]=useState('guiso_principal');const [desc,setDesc]=useState('');const [monto,setMonto]=useState('');
  const [enEfectivo,setEnEfectivo]=useState(true);const [confirmDel,setConfirmDel]=useState(null);
  const [showConfirmAdd,setShowConfirmAdd]=useState(false);const [nuevaCat,setNuevaCat]=useState('');
  const ja=state.jornadaActiva;
  if(!ja)return(<div className="safe-bottom"><TopBar title="Gastos 💸"/>
    <EmptyState emoji="🔒" title="Jornada no iniciada" sub="Ve a Inicio y abre la jornada"/></div>);
  const totalG=calcGastosTotal(ja.gastos);

  // Categorias dinamicas: las default + cualquiera que haya sido usada en gastos historicos
  const catsUsadas=useMemo(()=>{
    const custom=new Set();
    state.jornadas.forEach(j=>j.gastos.forEach(g=>{
      if(!CATS_GASTO_DEFAULT.find(c=>c.id===g.categoria))custom.add(g.categoria);
    }));
    if(ja)ja.gastos.forEach(g=>{
      if(!CATS_GASTO_DEFAULT.find(c=>c.id===g.categoria))custom.add(g.categoria);
    });
    return[...CATS_GASTO_DEFAULT,...[...custom].map(c=>({id:c,label:c.charAt(0).toUpperCase()+c.slice(1),emoji:'🏷️'}))];
  },[state.jornadas,ja]);

  const agregarCategoria=()=>{
    if(!nuevaCat.trim())return;
    const id=nuevaCat.trim().toLowerCase().replace(/\s+/g,'_');
    if(!catsUsadas.find(c=>c.id===id)){
      setCatSel(id);
    }else{setCatSel(id);}
    setNuevaCat('');
  };

  const intentarRegistrar=()=>{
    if(!monto||!desc)return;
    // Si la categoria no existe aun, crearla al vuelo
    const catId=nuevaCat.trim()?nuevaCat.trim().toLowerCase().replace(/\s+/g,'_'):catSel;
    setShowConfirmAdd({cat:catId,desc,monto:Number(monto),enEfectivo});
  };

  const confirmarRegistro=()=>{
    if(!showConfirmAdd)return;
    onRegistrar(showConfirmAdd.cat,showConfirmAdd.desc,showConfirmAdd.monto,showConfirmAdd.enEfectivo);
    setDesc('');setMonto('');setShowConfirmAdd(false);
  };

  const catActual=catsUsadas.find(c=>c.id===catSel)||{emoji:'🏷️',label:catSel};

  return(<div className="safe-bottom"><TopBar title="Gastos 💸" subtitle={`Total: ${fmt(totalG)}`}/>
    <div className="px-4 py-4 space-y-4">
      <div><p className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Categoria</p>
        <div className="flex gap-2 overflow-x-auto pb-1">{catsUsadas.map(c=>(
          <button key={c.id} onClick={()=>{setCatSel(c.id);setNuevaCat('');}}
            className={`flex-shrink-0 flex items-center gap-1 px-3 py-2 rounded-xl text-xs font-bold border-2
              ${catSel===c.id?'border-orange-500 bg-orange-50 text-orange-700':'border-gray-200 text-gray-500'}`}>{c.emoji} {c.label}</button>))}
          <button onClick={()=>setNuevaCat(' ')}
            className="flex-shrink-0 flex items-center gap-1 px-3 py-2 rounded-xl text-xs font-bold border-2 border-dashed border-gray-300 text-gray-400">+ Nueva</button>
        </div>
        {nuevaCat!==''&&(
          <div className="mt-2 flex gap-2">
            <input value={nuevaCat.trim()} onChange={e=>setNuevaCat(e.target.value)} placeholder="Nombre de categoria..."
              className="flex-1 px-3 py-2 text-sm border-2 border-orange-300 rounded-xl outline-none"/>
            <button onClick={agregarCategoria} className="px-3 py-2 bg-orange-500 text-white text-xs font-bold rounded-xl">Agregar</button>
          </div>)}</div>
      <Input label="Descripcion del gasto" value={desc} onChange={setDesc} placeholder="Ej: Carne 5kg, Especias varias..."/>
      <Input label="Monto total" type="number" value={monto} onChange={setMonto} prefix="$" placeholder="0"/>
      <div className="flex items-center gap-3">
        <button onClick={()=>setEnEfectivo(!enEfectivo)} className={`w-12 h-6 rounded-full transition-colors ${enEfectivo?'bg-green-500':'bg-gray-300'} relative`}>
          <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all ${enEfectivo?'right-0.5':'left-0.5'}`}/></button>
        <span className="text-sm text-gray-600">{enEfectivo?'💵 Efectivo':'📱 Otro'}</span></div>
      <Btn full size="lg" onClick={intentarRegistrar} disabled={!desc||!monto}>+ Registrar Gasto</Btn>

      <Modal open={!!showConfirmAdd} onClose={()=>setShowConfirmAdd(false)} title="✅ Confirmar gasto">
        {showConfirmAdd&&(<div className="space-y-4">
          <div className="bg-orange-50 rounded-2xl p-4 space-y-2">
            <div className="flex justify-between text-sm"><span className="text-gray-500">Categoria</span><span className="font-bold">{catActual.emoji} {showConfirmAdd.cat}</span></div>
            <div className="flex justify-between text-sm"><span className="text-gray-500">Descripcion</span><span className="font-bold">{showConfirmAdd.desc}</span></div>
            <div className="flex justify-between text-sm"><span className="text-gray-500">Monto</span><span className="font-black text-red-500 text-lg">{fmt(showConfirmAdd.monto)}</span></div>
            <div className="flex justify-between text-sm"><span className="text-gray-500">Pago</span><span className="font-bold">{showConfirmAdd.enEfectivo?'💵 Efectivo':'📱 Otro'}</span></div>
          </div>
          <p className="text-sm text-gray-500 text-center">Verifica que la informacion sea correcta antes de registrar.</p>
          <div className="flex gap-3">
            <Btn full color="gray" onClick={()=>setShowConfirmAdd(false)}>Corregir</Btn>
            <Btn full color="green" onClick={confirmarRegistro}>✅ Confirmar</Btn>
          </div>
        </div>)}
      </Modal>

      {ja.gastos.length>0&&(
        <div className="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
          <h3 className="font-black text-gray-800 mb-3 text-sm">Gastos del dia</h3>
          {[...ja.gastos].reverse().map(g=>{const cat=catsUsadas.find(c=>c.id===g.categoria);
            return(<div key={g.id} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
              <div className="flex items-center gap-2"><span className="text-lg">{cat?.emoji||'💸'}</span>
                <div><p className="text-sm font-bold text-gray-700">{g.descripcion}</p>
                  <p className="text-xs text-gray-400">{g.hora} · {cat?.label||g.categoria}</p></div></div>
              <div className="flex items-center gap-2"><span className="font-black text-red-500 text-sm">{fmt(g.monto)}</span>
                <button onClick={()=>setConfirmDel(g)} className="text-gray-300 text-lg" aria-label="Eliminar gasto">✕</button></div></div>);})}
          {confirmDel&&<div className="mt-3 bg-red-50 rounded-xl p-3 flex items-center justify-between">
            <span className="text-xs text-red-600">Eliminar "{confirmDel.descripcion}" ({fmt(confirmDel.monto)})?</span>
            <div className="flex gap-2">
              <button onClick={()=>setConfirmDel(null)} className="text-xs font-bold text-gray-500 px-2 py-1">No</button>
              <button onClick={()=>{onEliminar(confirmDel.id);setConfirmDel(null);}} className="text-xs font-bold text-red-600 bg-red-100 px-3 py-1 rounded-lg">Eliminar</button>
            </div></div>}
          <div className="border-t mt-3 pt-3 flex justify-between">
            <span className="font-bold text-sm">Total</span><span className="font-black text-red-500">{fmt(totalG)}</span></div>
        </div>)}
    </div></div>);
}

function MandaditosReport({jornadas,jornadaActiva}){
  const todas=[...jornadas.filter(j=>j.estado==='cerrada')];
  if(jornadaActiva)todas.push(jornadaActiva);
  const totalManda=todas.reduce((s,j)=>s+calcMandaditosTotal(j.mandaditos||[]),0);
  const totalEnvios=todas.reduce((s,j)=>s+(j.mandaditos||[]).length,0);
  const totalRecoger=todas.reduce((s,j)=>s+(j.pedidos||[]).filter(p=>p.tipoEntrega==='recoger'&&p.estado!=='cancelado').length,0);
  const totalClientes=totalEnvios+totalRecoger;
  const porTipo={};
  todas.forEach(j=>(j.mandaditos||[]).forEach(m=>{
    if(!porTipo[m.tipo])porTipo[m.tipo]={cant:0,total:0};
    porTipo[m.tipo].cant++;porTipo[m.tipo].total+=m.tarifa;
  }));
  return(<div className="space-y-5">
    {totalClientes===0&&<EmptyState emoji="🛵" title="Sin datos de envios" sub="Los mandaditos apareceran aqui"/>}
    {totalClientes>0&&(<React.Fragment>
      <div className="grid grid-cols-2 gap-3">
        <MetricCard icon="🛵" label="Ingresos Mandaditos" value={fmt(totalManda)} color="purple" sub="Contabilidad separada"/>
        <MetricCard icon="📦" label="Total Envios" value={totalEnvios} color="blue"/>
        <MetricCard icon="🏃" label="Pasan a Recoger" value={totalRecoger} color="green"/>
        <MetricCard icon="👥" label="Total Clientes" value={totalClientes} color="orange"/>
      </div>
      {Object.keys(porTipo).length>0&&(<div className="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
        <h3 className="font-black text-gray-800 mb-3 text-sm">Desglose por tipo de envio</h3>
        {Object.entries(porTipo).map(([tipo,data])=>{const t=TARIFAS_ENVIO[tipo];
          return(<div key={tipo} className="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
            <span className="text-sm text-gray-600">{t?.emoji} {t?.label||tipo}</span>
            <div className="text-right"><p className="font-bold text-sm text-purple-600">{fmt(data.total)}</p>
              <p className="text-xs text-gray-400">{data.cant} servicios</p></div></div>);})}
      </div>)}
      <div className="bg-purple-50 rounded-2xl p-4 text-sm text-purple-700">
        <p className="font-bold">📌 Nota: Mandaditos</p>
        <p className="text-xs mt-1 opacity-70">Este ingreso se contabiliza por separado del negocio. Es un servicio externo que no afecta la utilidad de ventas de productos.</p>
      </div>
    </React.Fragment>)}
  </div>);
}

    if(!empNombre)return;

      </div>

// ── Importar Tab ──
function ImportarTab({onImportarProductos,onImportarCostos,productos,costos}){
  const [status,setStatus]=useState('');const fileRef=useRef(null);const [importType,setImportType]=useState(null);

  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setStatus('📂 Leyendo archivo...');
    try{
      const data=await file.arrayBuffer();
      const wb=XLSX.read(data);
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws);
      if(!json.length){setStatus('❌ El archivo esta vacio');return;}

      if(importType==='menu'){
        const prods=json.map((r,i)=>({
          id:r.id||('prod_'+i),nombre:r.nombre||'',precio:Number(r.precio)||0,
          costo:Number(r.costo)||0,cat:r.categoria||'platillo',emoji:r.emoji||'🍽️',activo:r.activo!==false&&r.activo!=='no'
        })).filter(p=>p.nombre);
        if(prods.length){onImportarProductos(prods);setStatus(`✅ ${prods.length} productos importados`);}
        else setStatus('❌ No se encontraron productos validos');
      }else if(importType==='costos'){
        const cs=json.map((r,i)=>({
          id:r.id||('costo_'+i),nombre:r.nombre||'',unidad:r.unidad||'',
          pu:Number(r.precio_unitario||r.pu||r.precio)||0,cat:r.categoria||''
        })).filter(c=>c.nombre);
        if(cs.length){onImportarCostos(cs);setStatus(`✅ ${cs.length} costos importados`);}
        else setStatus('❌ No se encontraron costos validos');
      }
    }catch(e){setStatus(`❌ Error: ${e.message}`);}
    if(fileRef.current)fileRef.current.value='';
  };

  const descargarPlantilla=(tipo)=>{
    let wb,ws,data;
    if(tipo==='menu'){
      data=[{id:'consome',nombre:'Consome',precio:115,costo:38,categoria:'platillo',emoji:'🍲',activo:'si'}];
      productos.forEach(p=>{ if(p.id!=='consome')data.push({id:p.id,nombre:p.nombre,precio:p.precio,costo:p.costo,categoria:p.cat,emoji:p.emoji,activo:p.activo?'si':'no'});});
    }else{
      data=costos.map(c=>({id:c.id,nombre:c.nombre,unidad:c.unidad,precio_unitario:c.pu,categoria:c.cat}));
    }
    wb=XLSX.utils.book_new();ws=XLSX.utils.json_to_sheet(data);
    XLSX.utils.book_append_sheet(wb,ws,'Datos');
    XLSX.writeFile(wb,`plantilla_${tipo}.xlsx`);
  };

  return(<div className="space-y-5">
    <div className="bg-orange-50 rounded-2xl p-4 text-sm text-orange-700">
      <p className="font-bold mb-2">📥 Dashboard de Importacion</p>
      <p className="text-xs opacity-70">Sube archivos Excel (.xlsx) para actualizar datos sin necesidad de modificar codigo.</p>
    </div>
    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <h3 className="font-black text-gray-800 mb-4 text-sm">🍽️ Menu y Precios</h3>
      <p className="text-xs text-gray-500 mb-3">Actualiza los productos del menu, precios y costos estimados.</p>
      <div className="flex gap-2 mb-3">
        <Btn size="sm" color="gray" onClick={()=>descargarPlantilla('menu')}>📄 Descargar</Btn>
        <Btn size="sm" color="orange" onClick={()=>{setImportType('menu');fileRef.current?.click();}}>📤 Subir Excel</Btn>
      </div>
      <p className="text-xs text-gray-400">Columnas: id · nombre · precio · costo · categoria · emoji · activo</p>
    </div>
    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <h3 className="font-black text-gray-800 mb-4 text-sm">🧾 Base de Costos (Ingredientes)</h3>
      <p className="text-xs text-gray-500 mb-3">Actualiza la base de datos de costos de insumos.</p>
      <div className="flex gap-2 mb-3">
        <Btn size="sm" color="gray" onClick={()=>descargarPlantilla('costos')}>📄 Descargar</Btn>
        <Btn size="sm" color="orange" onClick={()=>{setImportType('costos');fileRef.current?.click();}}>📤 Subir Excel</Btn>
      </div>
      <p className="text-xs text-gray-400">Columnas: id · nombre · unidad · precio_unitario · categoria</p>
    </div>
    <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} className="hidden"/>
    {status&&<div className={`rounded-2xl p-4 text-sm font-bold text-center ${status.startsWith('✅')?'bg-green-50 text-green-700':status.startsWith('❌')?'bg-red-50 text-red-600':'bg-blue-50 text-blue-700'}`}>{status}</div>}
  </div>);
}

function ImpresoraTab({impresora,onActualizar}){
  const [status,setStatus]=useState('');const hasBT='bluetooth' in navigator;
  const conectar=async()=>{setStatus('Buscando...');const r=await connectBluetooth();
    if(r.success){onActualizar({tipo:'bluetooth',nombre:r.name,conectada:true});setStatus(`✅ ${r.name}`);}
    else setStatus(`❌ ${r.error}`);};
  const testPrint=async()=>{
    const p={numero:0,fecha:new Date().toISOString().slice(0,10),hora:new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}),
      tipoEntrega:'recoger',cliente:'PRUEBA',direccion:'',notas:'Ticket de prueba',totalProductos:100,costoEnvio:0,total:100,
      items:[{productoId:'test',nombre:'Producto prueba',cantidad:1,precio:100,subtotal:100,emoji:'🧪'}]};
    const r=await printTicket(p);setStatus(r.success?`✅ Impreso (${r.method})`:'❌ Error');};
  return(<div className="space-y-5">
    <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
      <h3 className="font-black text-gray-800 mb-4 text-sm">🖨️ Impresora de tickets</h3>
      <div className="space-y-4">
        <div className={`rounded-2xl p-4 border-2 ${impresora.conectada?'border-green-300 bg-green-50':impresora.reconectando?'border-yellow-300 bg-yellow-50':'border-gray-200 bg-gray-50'}`}>
          <div className="flex items-center gap-3"><span className="text-3xl">{impresora.conectada?'🟢':impresora.reconectando?'🟡':'⚪'}</span>
            <div><p className="font-bold text-sm">{impresora.conectada?impresora.nombre:impresora.reconectando?'Reconectando...':'Sin impresora'}</p>
              <p className="text-xs text-gray-500">{impresora.conectada?`${impresora.tipo} · Se mantiene activa`:impresora.reconectando?'Intentando recuperar la impresora':'Conecta una para imprimir tickets'}</p></div></div></div>
        {hasBT&&<Btn full onClick={conectar}>📡 Conectar Bluetooth</Btn>}
        {!hasBT&&<div className="bg-yellow-50 rounded-xl p-3 text-sm text-yellow-700">
          <p className="font-bold">⚠️ Bluetooth no disponible</p>
          <p className="text-xs mt-1">Los tickets se imprimiran como ventana emergente.</p></div>}
        <Btn full color="gray" onClick={testPrint}>🧪 Ticket de prueba</Btn>
        <div className="flex items-center justify-between">
          <div><p className="text-sm font-bold">Auto-imprimir</p><p className="text-xs text-gray-400">Al crear pedido</p></div>
          <button onClick={()=>onActualizar({autoImprimir:!impresora.autoImprimir})}
            className={`w-12 h-6 rounded-full ${impresora.autoImprimir?'bg-green-500':'bg-gray-300'} relative`}>
            <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow ${impresora.autoImprimir?'right-0.5':'left-0.5'}`}/></button></div>
        {status&&<p className="text-center text-sm font-bold">{status}</p>}
      </div></div>
  </div>);
}

function EditProductoForm({producto,onSave}){
  const [precio,setPrecio]=useState(producto.precio);const [costo,setCosto]=useState(producto.costo);
  const margen=precio>0?(((precio-costo)/precio)*100).toFixed(1):0;
  return(<div className="space-y-4">
    <Input label="Precio de venta" type="number" prefix="$" value={precio} onChange={v=>setPrecio(Number(v))}/>
    <Input label="Costo estimado" type="number" prefix="$" value={costo} onChange={v=>setCosto(Number(v))}/>
    <div className={`rounded-xl p-3 text-center font-bold ${margen>=40?'bg-green-50 text-green-700':margen>=20?'bg-yellow-50 text-yellow-700':'bg-red-50 text-red-600'}`}>
      Margen: {margen}% {margen>=40?'✅':margen>=20?'⚠️':'🚨'}</div>
    <Btn full onClick={()=>onSave({precio,costo})}>Guardar</Btn></div>);
}

// ─── APP ────────────────────────────────────────────────────────────
// Global callback for preview fallback
let _showTicketPreview=null;

function App(){
  const [page,setPage]=useState('dashboard');
  const {state,syncStatus,remoteUpdate,abrirJornada,cerrarJornada,crearPedido,actualizarPedido,
    registrarGasto,eliminarGasto,actualizarProducto,actualizarGastoFijo,agregarGastoFijo,eliminarGastoFijo,
    actualizarImpresora,importarProductos,importarCostos,agregarEmpleado,editarEmpleado,eliminarEmpleado}=useStore();
  const hasJornada=!!state.jornadaActiva;
  const pedidosNuevos=state.jornadaActiva?(state.jornadaActiva.pedidos||[]).filter(p=>p.estado==='nuevo').length:0;
  const [toast,setToast]=useState(null);
  const [previewPedido,setPreviewPedido]=useState(null);
  const showToast=(msg,color='green')=>{setToast({msg,color});setTimeout(()=>setToast(null),2500);};
  // Register global preview callback
  useEffect(()=>{_showTicketPreview=(pedido)=>setPreviewPedido(pedido);return()=>{_showTicketPreview=null;};},[]);
  // Auto-conectar impresora BT al arrancar + mantener estado sincronizado
  useEffect(()=>{
    _onPrinterStateChange=(s)=>{actualizarImpresora({conectada:!!s.conectada,reconectando:!!s.reconectando});};
    if(state.impresora?.tipo==='bluetooth'&&state.impresora?.nombre){
      tryAutoConnectPrinter().then(ok=>{
        if(ok)actualizarImpresora({conectada:true,reconectando:false});
      });
    }
    return()=>{_onPrinterStateChange=null;};
  },[]);
  return(<div className="relative min-h-screen">
    {page==='dashboard'&&<DashboardPage state={state} syncStatus={syncStatus}
      onAbrir={(f,d)=>{abrirJornada(f,d);showToast('🟢 Jornada abierta');}}
      onCerrar={(e,o)=>{cerrarJornada(e,o);showToast('🔴 Jornada cerrada','red');}}/>}
    {page==='pedidos'&&<PedidosPage state={state}
      onCrearPedido={(i,t,c,dir,n)=>{const p=crearPedido(i,t,c,dir,n);showToast(`📋 Pedido #${String(p?.numero||0).padStart(3,'0')} creado`);return p;}}
      onActualizarPedido={(id,c)=>{actualizarPedido(id,c);
        if(c.cobrado)showToast('💰 Cobrado','green');
        else if(c.estado==='entregado')showToast('✅ Entregado','green');
        else if(c.estado==='cancelado')showToast('🔴 Cancelado','red');
        else if(c.items||c.tipoEntrega)showToast('✏️ Pedido editado','orange');}}/>}
    {page==='gastos'&&<GastosPage state={state}
      onRegistrar={(c,d,m,e)=>{registrarGasto(c,d,m,e);showToast('💸 Gasto registrado','orange');}}
      onEliminar={eliminarGasto}/>}
    {page==='reportes'&&<ReportesPage state={state}/>}
    {page==='admin'&&<AdminPage state={state} onActualizarProducto={actualizarProducto}
      onActualizarGastoFijo={actualizarGastoFijo} onAgregarGastoFijo={n=>{agregarGastoFijo(n);showToast('✅ Gasto fijo agregado');}}
      onEliminarGastoFijo={id=>{eliminarGastoFijo(id);showToast('🗑️ Gasto fijo eliminado','red');}}
      onActualizarImpresora={actualizarImpresora}
      onImportarProductos={p=>{importarProductos(p);showToast('✅ Productos actualizados');}}
      onImportarCostos={c=>{importarCostos(c);showToast('✅ Costos actualizados');}}
      onAgregarEmpleado={(n,r,s)=>{agregarEmpleado(n,r,s);showToast('✅ Empleado agregado');}}
      onEditarEmpleado={(id,d)=>{editarEmpleado(id,d);showToast('✅ Empleado actualizado');}}
      onEliminarEmpleado={id=>{eliminarEmpleado(id);showToast('🗑️ Empleado eliminado','red');}}/>}
    <BottomNav page={page} setPage={setPage} hasJornada={hasJornada} pedidosNuevos={pedidosNuevos}/>
    {toast&&(<div className={`fixed top-20 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl text-white font-bold text-sm shadow-xl slide-up
      ${toast.color==='green'?'bg-green-500':toast.color==='red'?'bg-red-500':toast.color==='orange'?'bg-orange-500':'bg-gray-700'}`}>{toast.msg}</div>)}
    {remoteUpdate&&(<div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl bg-blue-500 text-white font-bold text-sm shadow-xl slide-up">
      🔄 Datos actualizados desde otro dispositivo</div>)}
    <TicketPreviewModal open={!!previewPedido} pedido={previewPedido} onClose={()=>setPreviewPedido(null)}/>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
// Hide splash after render — smooth transition from orange to app
setTimeout(()=>{
  const s=document.getElementById('splash');
  if(s){s.style.opacity='0';setTimeout(()=>s.remove(),500);}
  document.body.classList.add('loaded');
  document.getElementById('root')?.classList.add('loaded');
},600);
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;if(!nw)return;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='activated'&&navigator.serviceWorker.controller){
          window.location.reload();
        }
      });
    });
    setInterval(()=>{reg.update().catch(()=>{});},60000);
  }).catch(()=>{});
  let reloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(reloaded)return;reloaded=true;window.location.reload();
  });
}
</script>
</body>
